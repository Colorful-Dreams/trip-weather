<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Intl. Calling Days</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'DM Sans',sans-serif;
  background:transparent;
  color:#1c1a17;
  padding:16px;
}

.section-label{
  font-size:11px;font-weight:500;color:#b4b2a9;
  text-transform:uppercase;letter-spacing:0.07em;
  text-align:center;margin-bottom:16px;
}

.cards-row{
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
}

/* Phone card */
.phone-card{
  background:#fff;
  border:0.5px solid rgba(0,0,0,0.10);
  border-radius:14px;
  padding:18px 18px 16px;
  width:220px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.phone-num{
  font-size:14px;font-weight:500;color:#1c1a17;
  letter-spacing:0.02em;
}

.phone-owner{
  font-family:'Playfair Display',serif;
  font-size:13px;font-style:italic;color:#9b9489;
  margin-top:1px;
}

/* Progress ring area */
.ring-wrap{
  display:flex;
  align-items:center;
  gap:14px;
}

.ring-svg{
  flex-shrink:0;
}

.ring-bg{stroke:#f1efe8;fill:none;}
.ring-fill{fill:none;stroke-linecap:round;transition:stroke-dashoffset 0.5s ease, stroke 0.5s ease;}

.days-count{
  font-size:36px;font-weight:500;line-height:1;
  transition:color 0.4s;
}
.days-label{
  font-size:11px;color:#9b9489;margin-top:2px;
}

/* Status badge */
.status-badge{
  display:inline-block;
  font-size:11px;font-weight:500;
  padding:3px 10px;border-radius:99px;
  transition:background 0.4s, color 0.4s;
}
.status-green   {background:#EAF3DE;color:#3B6D11;}
.status-yellow  {background:#FAEEDA;color:#854F0B;}
.status-red     {background:#FCEBEB;color:#A32D2D;}

/* Bar */
.bar-wrap{
  background:#f1efe8;border-radius:99px;
  height:6px;overflow:hidden;
}
.bar-fill{
  height:100%;border-radius:99px;
  transition:width 0.5s ease, background 0.5s ease;
}

/* Use day button */
.use-btn{
  font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:500;
  padding:9px 0;border-radius:9px;
  border:none;cursor:pointer;
  width:100%;
  transition:opacity 0.15s, background 0.3s;
  color:#fff;
}
.use-btn:hover{opacity:0.88;}
.use-btn:active{transform:scale(0.98);}
.use-btn:disabled{opacity:0.35;cursor:not-allowed;}

/* Undo row */
.undo-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.used-today{
  font-size:11px;color:#9b9489;
}
.undo-btn{
  font-family:'DM Sans',sans-serif;
  font-size:11px;font-weight:500;color:#5f5e5a;
  background:none;border:0.5px solid rgba(0,0,0,0.13);
  border-radius:6px;padding:3px 9px;cursor:pointer;
}
.undo-btn:hover{background:#f5f5f3;}
.undo-btn:disabled{opacity:0.3;cursor:not-allowed;}

/* History log */
.history{
  border-top:0.5px solid rgba(0,0,0,0.07);
  padding-top:10px;
}
.history-title{
  font-size:10px;font-weight:500;color:#b4b2a9;
  text-transform:uppercase;letter-spacing:0.06em;
  margin-bottom:6px;
}
.history-list{
  display:flex;
  flex-direction:column;
  gap:3px;
  max-height:80px;
  overflow-y:auto;
}
.history-item{
  font-size:11px;color:#9b9489;
}

/* Reset button */
.reset-row{
  text-align:center;
  margin-top:8px;
}
.reset-btn{
  font-family:'DM Sans',sans-serif;
  font-size:11px;color:#b4b2a9;
  background:none;border:none;cursor:pointer;
  text-decoration:underline;text-underline-offset:2px;
}
.reset-btn:hover{color:#a32d2d;}

@media(max-width:480px){
  .phone-card{width:100%;}
  .cards-row{flex-direction:column;align-items:center;}
}
</style>
</head>
<body>

<div class="section-label">International calling days</div>
<div class="cards-row" id="cards-row"></div>
<div class="reset-row">
  <button class="reset-btn" onclick="confirmReset()">Reset all to 11 days</button>
</div>

<script>
var SKEY      = "intl-calling-2026";
var APPS_URL = "https://script.google.com/macros/s/AKfycbzUDiET7vZZJrHpTydoR6hpBixpqP9yUK_qHlvLi-oIVKoPOAaf7YUTYm2ahZ1lnNeJ/exec";
var SYNC_KEY = "calling-state";
var saveTimer = null;

function syncLoad(onData) {
  onData(null);
  fetch(APPS_URL + "?key=" + encodeURIComponent(SYNC_KEY))
  .then(function(r) { return r.text(); })
  .then(function(text) {
    if (!text || text.trim() === "{}") return;
    try {
      var parsed = JSON.parse(text);
      if (parsed && typeof parsed === "object" && Object.keys(parsed).length > 0) {
        onData(parsed);
      }
    } catch(ex) {}
  })
  .catch(function() {
    try {
      var x = localStorage.getItem("calling-local");
      if (x) { var p = JSON.parse(x); if (p && Object.keys(p).length > 0) onData(p); }
    } catch(ex) {}
  });
}

function syncSave(data) {
  try { localStorage.setItem("calling-local", JSON.stringify(data)); } catch(ex) {}
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(function() {
    fetch(APPS_URL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({key: SYNC_KEY, value: JSON.stringify(data)})
    }).catch(function() {});
  }, 800);
}
var MAX_DAYS = 11;
var PHONES = [
  { id:"p1", number:"609-647-1698", owner:"Theresa" },
  { id:"p2", number:"609-647-1697", owner:"David" }
];
var STATE = {};


function normState() {
  PHONES.forEach(function(p) {
    if (!STATE[p.id]) STATE[p.id] = { remaining: MAX_DAYS, history: [] };
    if (STATE[p.id].remaining === undefined) STATE[p.id].remaining = MAX_DAYS;
    if (!STATE[p.id].history) STATE[p.id].history = [];
  });
}

function loadState() {
  syncLoad(function(data) {
    if (data) STATE = data;
    normState();
    renderCards();
  });
}

function saveState() {
  syncSave(STATE);
}

/* ---- Status helpers ---- */
function statusClass(remaining) {
  if (remaining <= 0)  return "status-red";
  if (remaining <= 5)  return "status-yellow";
  return "status-green";
}

function statusLabel(remaining) {
  if (remaining <= 0)  return "No days left";
  if (remaining <= 5)  return "Running low";
  return "Good";
}

function accentColor(remaining) {
  if (remaining <= 0)  return "#E24B4A";
  if (remaining <= 5)  return "#EF9F27";
  return "#1D9E75";
}

function pad(n) { return n < 10 ? "0" + n : String(n); }

function fmtDate(iso) {
  var d = new Date(iso);
  var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return months[d.getMonth()] + " " + d.getDate() + " at " +
    ((d.getHours() % 12) || 12) + ":" + pad(d.getMinutes()) +
    (d.getHours() >= 12 ? " PM" : " AM");
}

/* ---- Actions ---- */
function useDay(phoneId) {
  var st = STATE[phoneId];
  if (st.remaining <= 0) return;
  st.remaining -= 1;
  st.history.unshift({ date: new Date().toISOString(), action: "used" });
  saveState();
  renderCards();
}

function undoDay(phoneId) {
  var st = STATE[phoneId];
  if (st.remaining >= MAX_DAYS) return;
  if (!st.history.length) return;
  st.remaining += 1;
  st.history.shift();
  saveState();
  renderCards();
}

function confirmReset() {
  if (!confirm("Reset both phones back to 11 days? This will clear all history.")) return;
  PHONES.forEach(function(p) {
    STATE[p.id] = { remaining: MAX_DAYS, history: [] };
  });
  saveState();
  renderCards();
}

/* ---- Render ---- */
function renderCards() {
  var container = document.getElementById("cards-row");
  var html = "";

  PHONES.forEach(function(p) {
    var st    = STATE[p.id];
    var rem   = st.remaining;
    var color = accentColor(rem);
    var sc    = statusClass(rem);
    var sl    = statusLabel(rem);
    var pct   = rem / MAX_DAYS;

    /* SVG ring params */
    var r = 32, circ = 2 * Math.PI * r;
    var offset = circ * (1 - pct);

    /* History items */
    var histHTML = "";
    var hist = st.history.slice(0, 6);
    if (hist.length === 0) {
      histHTML = '<div class="history-item">No days used yet</div>';
    } else {
      hist.forEach(function(h) {
        histHTML += '<div class="history-item">Day used — ' + fmtDate(h.date) + '</div>';
      });
    }

    html += '<div class="phone-card">' +

      /* Header */
      '<div>' +
        '<div class="phone-num">' + p.number + '</div>' +
        '<div class="phone-owner">' + p.owner + '</div>' +
      '</div>' +

      /* Ring + count */
      '<div class="ring-wrap">' +
        '<svg class="ring-svg" width="80" height="80" viewBox="0 0 80 80">' +
          '<circle class="ring-bg" cx="40" cy="40" r="' + r + '" stroke-width="7"/>' +
          '<circle class="ring-fill" cx="40" cy="40" r="' + r + '" stroke-width="7"' +
            ' stroke="' + color + '"' +
            ' stroke-dasharray="' + circ.toFixed(2) + '"' +
            ' stroke-dashoffset="' + offset.toFixed(2) + '"' +
            ' transform="rotate(-90 40 40)"/>' +
        '</svg>' +
        '<div>' +
          '<div class="days-count" style="color:' + color + '">' + rem + '</div>' +
          '<div class="days-label">of ' + MAX_DAYS + ' days<br>remaining</div>' +
        '</div>' +
      '</div>' +

      /* Bar */
      '<div class="bar-wrap">' +
        '<div class="bar-fill" style="width:' + (pct*100).toFixed(1) + '%;background:' + color + '"></div>' +
      '</div>' +

      /* Status badge */
      '<div><span class="status-badge ' + sc + '">' + sl + '</span></div>' +

      /* Use day button */
      '<button class="use-btn" style="background:' + color + '"' +
        (rem <= 0 ? ' disabled' : '') +
        ' onclick="useDay(\'' + p.id + '\')">' +
        (rem <= 0 ? 'No days remaining' : 'Use a day') +
      '</button>' +

      /* Undo row */
      '<div class="undo-row">' +
        '<div class="used-today">' + (MAX_DAYS - rem) + ' day' + (MAX_DAYS - rem !== 1 ? 's' : '') + ' used</div>' +
        '<button class="undo-btn"' +
          (st.history.length === 0 ? ' disabled' : '') +
          ' onclick="undoDay(\'' + p.id + '\')">Undo</button>' +
      '</div>' +

      /* History */
      '<div class="history">' +
        '<div class="history-title">Recent activity</div>' +
        '<div class="history-list">' + histHTML + '</div>' +
      '</div>' +

    '</div>';
  });

  container.innerHTML = html;
}

/* ---- Boot ---- */
loadState();
</script>
</body>
</html>
