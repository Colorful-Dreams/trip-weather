<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portugal & Spain Trip Weather</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f3;
      color: #1a1a18;
      padding: 24px 16px;
      min-height: 100vh;
    }

    .widget {
      max-width: 720px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .header h1 {
      font-size: 17px;
      font-weight: 500;
      color: #1a1a18;
    }

    .header p {
      font-size: 12px;
      color: #888780;
      margin-top: 2px;
    }

    .refresh-btn {
      font-size: 13px;
      font-family: inherit;
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
      color: #1a1a18;
      white-space: nowrap;
    }

    .refresh-btn:hover { background: #f0efe8; }

    .last-updated {
      font-size: 11px;
      color: #b4b2a9;
      margin-bottom: 20px;
      margin-top: 4px;
    }

    .info-box {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 14px;
    }

    .info-box .title {
      font-size: 14px;
      font-weight: 500;
      color: #1a1a18;
      margin-bottom: 4px;
    }

    .info-box .subtitle {
      font-size: 13px;
      color: #5f5e5a;
      line-height: 1.5;
    }

    .city-card {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 12px;
    }

    .city-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .city-name {
      font-size: 16px;
      font-weight: 500;
      color: #1a1a18;
    }

    .city-country {
      font-size: 12px;
      color: #b4b2a9;
      margin-left: 6px;
    }

    .city-dates {
      font-size: 12px;
      color: #888780;
    }

    .avg-high {
      font-size: 12px;
      color: #5f5e5a;
      text-align: right;
      margin-top: 2px;
    }

    .col-headers {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #b4b2a9;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding-bottom: 6px;
    }

    .day-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-top: 0.5px solid rgba(0,0,0,0.08);
      font-size: 13px;
    }

    .day-label { color: #5f5e5a; min-width: 100px; }
    .day-cond  { flex: 1; text-align: center; color: #888780; font-size: 12px; }
    .day-temp  { font-weight: 500; color: #1a1a18; min-width: 50px; text-align: right; }
    .day-rain  { font-size: 12px; min-width: 50px; text-align: right; }

    .rain-low  { color: #3b6d11; }
    .rain-mid  { color: #854f0b; }
    .rain-high { color: #a32d2d; }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .stat-cell {
      background: #f5f5f3;
      border-radius: 8px;
      padding: 8px 10px;
      border: 0.5px solid rgba(0,0,0,0.08);
    }

    .stat-label {
      font-size: 11px;
      color: #b4b2a9;
      margin-bottom: 3px;
    }

    .stat-value {
      font-size: 14px;
      font-weight: 500;
      color: #1a1a18;
    }

    .city-note {
      font-size: 12px;
      color: #b4b2a9;
      margin-top: 10px;
    }

    .error-note {
      font-size: 12px;
      color: #a32d2d;
      margin-top: 8px;
    }

    @media (max-width: 480px) {
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
      .day-cond { display: none; }
    }
  </style>
</head>
<body>
<div class="widget">
  <div class="header">
    <div>
      <h1>Trip weather forecast</h1>
      <p>Theresa & David &middot; Portugal & Spain &middot; Apr 8–25, 2026</p>
    </div>
    <button class="refresh-btn" onclick="loadWeather()">Refresh ↻</button>
  </div>
  <div class="last-updated" id="last-updated">Loading...</div>
  <div id="weather-container"></div>
</div>

<script>
  const cities = [
    { name:"Lisbon",    country:"Portugal", lat:38.7223, lon:-9.1393,  dates:"Apr 9–13",  start:"2026-04-09", end:"2026-04-13" },
    { name:"Seville",  country:"Spain",    lat:37.3886, lon:-5.9823,  dates:"Apr 13–16", start:"2026-04-13", end:"2026-04-16" },
    { name:"Madrid",   country:"Spain",    lat:40.4168, lon:-3.7038,  dates:"Apr 16–19", start:"2026-04-16", end:"2026-04-19" },
    { name:"Valencia", country:"Spain",    lat:39.4699, lon:-0.3763,  dates:"Apr 19–22", start:"2026-04-19", end:"2026-04-22" },
    { name:"Barcelona",country:"Spain",    lat:41.3874, lon: 2.1686,  dates:"Apr 22–25", start:"2026-04-22", end:"2026-04-25" }
  ];

  const historical = [
    { name:"Lisbon",    dates:"Apr 9–13",  highRange:"66–72°F", overnight:"54–58°F", rain:"Low",          note:"Mild and mostly sunny" },
    { name:"Seville",  dates:"Apr 13–16", highRange:"72–80°F", overnight:"54–60°F", rain:"Low",          note:"Warm and sunny" },
    { name:"Madrid",   dates:"Apr 16–19", highRange:"62–68°F", overnight:"46–52°F", rain:"Low–Moderate", note:"Cooler mornings & evenings" },
    { name:"Valencia", dates:"Apr 19–22", highRange:"66–70°F", overnight:"56–60°F", rain:"Low",          note:"Pleasant Mediterranean weather" },
    { name:"Barcelona",dates:"Apr 22–25", highRange:"62–68°F", overnight:"52–56°F", rain:"Low–Moderate", note:"Mild, possible showers" }
  ];

  const DAY_NAMES   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  function condLabel(code) {
    if (code === 0)        return "Clear";
    if (code <= 2)         return "Partly cloudy";
    if (code === 3)        return "Overcast";
    if (code <= 48)        return "Foggy";
    if (code <= 57)        return "Drizzle";
    if (code <= 67)        return "Rain";
    if (code <= 77)        return "Snow";
    if (code <= 82)        return "Showers";
    return "Stormy";
  }

  function rainClass(pct) {
    if (pct <= 25) return "rain-low";
    if (pct <= 55) return "rain-mid";
    return "rain-high";
  }

  function fmtDate(dateStr) {
    const d = new Date(dateStr + "T12:00:00Z");
    return DAY_NAMES[d.getUTCDay()] + " " + MONTH_NAMES[d.getUTCMonth()] + " " + d.getUTCDate();
  }

  function daysUntil(dateStr) {
    const target  = new Date(dateStr + "T00:00:00Z").getTime();
    const now     = new Date();
    const todayUTC = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
    return Math.ceil((target - todayUTC) / 86400000);
  }

  function historicalHTML() {
    const daysLeft = daysUntil("2026-04-09");
    let html = `<div class="info-box">
      <div class="title">Trip starts in ${daysLeft} day${daysLeft !== 1 ? "s" : ""}</div>
      <div class="subtitle">Live 14-day forecasts become available around <strong>March 26</strong>. Historical April averages are shown below — hit Refresh after March 26 for live data.</div>
    </div>`;

    for (const d of historical) {
      html += `<div class="city-card">
        <div class="city-header">
          <span class="city-name">${d.name}</span>
          <span class="city-dates">${d.dates}</span>
        </div>
        <div class="stat-grid">
          <div class="stat-cell"><div class="stat-label">Daytime high</div><div class="stat-value">${d.highRange}</div></div>
          <div class="stat-cell"><div class="stat-label">Overnight</div><div class="stat-value">${d.overnight}</div></div>
          <div class="stat-cell"><div class="stat-label">Rain chance</div><div class="stat-value">${d.rain}</div></div>
        </div>
        <div class="city-note">${d.note}</div>
      </div>`;
    }
    return html;
  }

  async function loadWeather() {
    const container  = document.getElementById("weather-container");
    const lastUpdated = document.getElementById("last-updated");
    container.innerHTML = '<div style="font-size:13px;color:#888780;padding:8px 0;">Checking forecast availability...</div>';

    if (daysUntil("2026-04-09") > 14) {
      container.innerHTML = historicalHTML();
      lastUpdated.textContent = "Historical averages shown · Live forecast available ~March 26";
      return;
    }

    try {
          fetch(`https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&daily=temperature_2m_max,precipitation_probability_max,weathercode&temperature_unit=fahrenheit&timezone=auto&forecast_days=16`).then(r => r.json())
      ));

      let html = "";
      for (let i = 0; i < cities.length; i++) {
        const city = cities[i];
        const data = results[i];

        if (!data.daily) {
          html += `<div class="city-card"><span class="city-name">${city.name}</span><div style="font-size:13px;color:#888780;margin-top:8px;">Forecast unavailable</div></div>`;
          continue;
        }

        const days = data.daily.time
          .map((d, idx) => ({
            date: d,
            high: data.daily.temperature_2m_max[idx],
            rain: data.daily.precipitation_probability_max[idx],
            code: data.daily.weathercode[idx]
          }))
          .filter(d => d.date >= city.start && d.date < city.end);

        const avgHigh = days.length
          ? Math.round(days.reduce((s, d) => s + d.high, 0) / days.length)
          : null;

        html += `<div class="city-card">
          <div class="city-header">
            <div>
              <span class="city-name">${city.name}</span>
              <span class="city-country">${city.country}</span>
            </div>
            <div>
              <div class="city-dates">${city.dates}</div>
              ${avgHigh ? `<div class="avg-high">avg high ${avgHigh}°F</div>` : ""}
            </div>
          </div>
          <div class="col-headers">
            <span>Day</span>
            <span style="flex:1;text-align:center;">Condition</span>
            <span style="min-width:50px;text-align:right;">High</span>
            <span style="min-width:50px;text-align:right;">Rain</span>
          </div>`;

        if (days.length === 0) {
          html += `<div style="font-size:13px;color:#888780;padding-top:8px;">No forecast data yet for these dates.</div>`;
        } else {
          for (const d of days) {
            html += `<div class="day-row">
              <span class="day-label">${fmtDate(d.date)}</span>
              <span class="day-cond">${condLabel(d.code)}</span>
              <span class="day-temp">${Math.round(d.high)}°F</span>
              <span class="day-rain ${rainClass(d.rain)}">${d.rain}%</span>
            </div>`;
          }
        }
        html += `</div>`;
      }

      container.innerHTML = html;
      const now = new Date();
      lastUpdated.textContent = `Updated ${now.toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"})} · Source: Open-Meteo`;

    } catch (err) {
      container.innerHTML = historicalHTML() +
        `<div class="error-note">Live forecast unavailable — showing historical averages instead.</div>`;
      lastUpdated.textContent = "Live fetch failed · Showing historical averages";
    }
  }

  loadWeather();
</script>
</body>
</html>
