<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Itinerary - Portugal &amp; Spain 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink:#1c1a17; --paper:#faf8f4; --card:#fff; --muted:#9b9489;
  --rule:rgba(0,0,0,0.08); --accent:#c8793a; --accent-light:#fdf0e6;
  --lisbon:#185FA5;    --lisbon-bg:#E6F1FB;
  --seville:#854F0B;   --seville-bg:#FAEEDA;
  --madrid:#534AB7;    --madrid-bg:#EEEDFE;
  --valencia:#3B6D11;  --valencia-bg:#EAF3DE;
  --barcelona:#993556; --barcelona-bg:#FBEAF0;
  --travel-bg:#F1EFE8; --green:#1D9E75;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);}
.hdr{background:var(--card);border-bottom:0.5px solid var(--rule);padding:20px 24px 16px;}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.site-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;letter-spacing:-0.2px;}
.site-title em{font-style:italic;color:var(--accent);}
.site-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.hdr-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.stats{display:flex;gap:18px;}
.stat-num{font-size:20px;font-weight:500;line-height:1;}
.stat-label{font-size:11px;color:var(--muted);}
.edit-btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
  padding:6px 14px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.15);
  background:#fff;color:#5f5e5a;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.edit-btn:hover{background:#f5f5f3;}
.edit-btn.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.city-nav{display:flex;gap:6px;flex-wrap:wrap;}
.cpill{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
  padding:5px 14px;border-radius:99px;border:0.5px solid rgba(0,0,0,0.13);
  background:var(--card);color:#5f5e5a;text-decoration:none;}
.cpill-l{background:var(--lisbon-bg);   color:var(--lisbon);   border-color:var(--lisbon);}
.cpill-s{background:var(--seville-bg);  color:var(--seville);  border-color:var(--seville);}
.cpill-m{background:var(--madrid-bg);   color:var(--madrid);   border-color:var(--madrid);}
.cpill-v{background:var(--valencia-bg); color:var(--valencia); border-color:var(--valencia);}
.cpill-b{background:var(--barcelona-bg);color:var(--barcelona);border-color:var(--barcelona);}
.main{padding:24px 24px 60px;max-width:860px;margin:0 auto;}
.city-sec{margin-bottom:44px;scroll-margin-top:14px;}
.city-hdr{display:flex;align-items:center;gap:14px;margin-bottom:18px;padding-bottom:12px;border-bottom:0.5px solid var(--rule);}
.city-bar{width:4px;height:44px;border-radius:99px;flex-shrink:0;}
.city-name{font-family:'Playfair Display',serif;font-size:26px;font-weight:400;letter-spacing:-0.3px;}
.city-dates{font-size:13px;color:var(--muted);margin-top:2px;}
.city-hotel{font-size:12px;color:var(--muted);margin-top:3px;font-style:italic;}
.tcard{background:var(--card);border:0.5px solid var(--rule);border-radius:14px;
  padding:16px 20px;margin-bottom:12px;display:flex;align-items:center;gap:16px;}
.ticon{font-size:20px;flex-shrink:0;width:40px;height:40px;background:var(--travel-bg);
  border-radius:10px;display:flex;align-items:center;justify-content:center;}
.troute{font-size:15px;font-weight:500;color:var(--ink);margin-bottom:3px;}
.tdetail{font-size:12px;color:var(--muted);}
.tmeta{text-align:right;}
.ttime{font-size:14px;font-weight:500;color:var(--ink);}
.tcode{font-size:11px;color:var(--muted);margin-top:2px;}
.dcard{background:var(--card);border:0.5px solid var(--rule);border-radius:14px;margin-bottom:12px;overflow:hidden;}
.dhdr{display:flex;align-items:center;gap:14px;padding:13px 18px;cursor:pointer;
  user-select:none;border-bottom:0.5px solid transparent;transition:background 0.15s;}
.dhdr:hover{background:#faf8f4;}
.dhdr.open{border-bottom-color:var(--rule);}
.dnum{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;min-width:38px;}
.dtblock{flex:1;}
.dweekday{font-size:15px;font-weight:500;color:var(--ink);}
.dsub{font-size:12px;color:var(--muted);margin-top:1px;}
.dfocus{font-size:12px;color:var(--muted);font-style:italic;text-align:right;max-width:200px;}
.dchev{font-size:12px;color:var(--muted);transition:transform 0.2s;flex-shrink:0;}
.dhdr.open .dchev{transform:rotate(180deg);}
.dbody{display:none;padding:0 18px 14px;}
.dbody.open{display:block;}
.srow{display:flex;gap:12px;padding:8px 0;border-bottom:0.5px solid var(--rule);align-items:flex-start;}
.srow:last-of-type{border-bottom:none;}
.stime{font-size:12px;font-weight:500;color:var(--muted);min-width:68px;padding-top:1px;flex-shrink:0;text-align:right;}
.sdot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.scont{flex:1;min-width:0;}
.sname{font-size:13px;font-weight:500;color:var(--ink);line-height:1.4;}
.sdet{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4;}
.tag{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:99px;
  margin-left:5px;vertical-align:middle;position:relative;top:-1px;}
.tag-dining   {background:#FAECE7;color:#993C1D;}
.tag-activity {background:#EEEDFE;color:#534AB7;}
.tag-show     {background:#FBEAF0;color:#993556;}
.tag-travel   {background:#F1EFE8;color:#5F5E5A;}
.tag-confirmed{background:#EAF3DE;color:#3B6D11;}
.tag-custom   {background:#E6F1FB;color:#185FA5;}
.tag-edited   {background:#FAEEDA;color:#854F0B;}
.dnote{background:var(--accent-light);border-radius:8px;padding:9px 12px;
  font-size:12px;color:#7a4820;margin-top:10px;line-height:1.5;}
.srule{display:flex;align-items:center;gap:12px;margin:0 0 14px;}
.srule-line{flex:1;height:0.5px;background:var(--rule);}
.srule-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;}
.ractions{display:none;gap:4px;flex-shrink:0;margin-left:6px;}
body.emode .ractions{display:flex;}
.rbtn{font-size:11px;font-family:'DM Sans',sans-serif;padding:3px 8px;border-radius:5px;
  border:0.5px solid rgba(0,0,0,0.13);cursor:pointer;background:#fff;color:#5f5e5a;line-height:1.4;}
.rbtn:hover{background:#f5f5f3;}
.rbtn.del{color:#a32d2d;border-color:rgba(163,45,45,0.2);}
.rbtn.del:hover{background:#fcebeb;}
.addbtn{display:none;width:100%;margin-top:8px;font-family:'DM Sans',sans-serif;
  font-size:12px;font-weight:500;padding:7px 12px;border-radius:8px;
  border:0.5px dashed rgba(0,0,0,0.18);background:transparent;color:var(--muted);
  cursor:pointer;text-align:left;transition:background 0.15s;}
.addbtn:hover{background:#f5f5f3;color:var(--ink);}
body.emode .addbtn{display:block;}
.moverlay{display:none;position:fixed;inset:0;background:rgba(20,18,15,0.5);
  z-index:500;align-items:center;justify-content:center;padding:20px;}
.moverlay.open{display:flex;}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:460px;
  box-shadow:0 8px 32px rgba(0,0,0,0.14);}
.mtitle{font-family:'Playfair Display',serif;font-size:17px;font-weight:400;
  font-style:italic;color:var(--ink);margin-bottom:18px;}
.mf{margin-bottom:14px;}
.mf label{display:block;font-size:11px;font-weight:500;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;}
.mf input,.mf select,.mf textarea{
  width:100%;font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 12px;
  border-radius:8px;border:0.5px solid rgba(0,0,0,0.18);color:var(--ink);
  background:#faf8f4;outline:none;}
.mf input:focus,.mf select:focus,.mf textarea:focus{
  border-color:var(--accent);box-shadow:0 0 0 2px rgba(200,121,58,0.12);}
.mf textarea{resize:vertical;min-height:64px;}
.macts{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap;}
.mbtn{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  padding:8px 18px;border-radius:8px;cursor:pointer;border:none;}
.mbtn.cancel{background:#f5f5f3;color:#5f5e5a;}
.mbtn.cancel:hover{background:#ede9e2;}
.mbtn.save{background:var(--ink);color:#fff;}
.mbtn.save:hover{opacity:0.85;}
.mbtn.danger{background:#fcebeb;color:#a32d2d;margin-right:auto;}
.mbtn.danger:hover{background:#f7c1c1;}
@media(max-width:520px){
  .hdr,.main{padding:14px;}
  .dfocus,.tmeta{display:none;}
  .city-name{font-size:22px;}
}
</style>
</head>

    <div>
      <div class="site-title">Theresa &amp; David &mdash; <em>Portugal &amp; Spain 2026</em></div>

<div class="main" id="main"></div>

    <div class="mf"><label>Details (optional)</label><textarea id="md" placeholder="Notes, backups, reminders..."></textarea></div>
    <div class="mf"><label>Type</label>

</div>

<script>
var APPS_URL = "https://script.google.com/macros/s/AKfycbzUDiET7vZZJrHpTydoR6hpBixpqP9yUK_qHlvLi-oIVKoPOAaf7YUTYm2ahZ1lnNeJ/exec";
var SYNC_KEY = "itin26v2";
var saveTimer = null;

function syncLoad(onData) {
  onData(null);
  fetch(APPS_URL + "?key=" + encodeURIComponent(SYNC_KEY))
  .then(function(r) { return r.text(); })
  .then(function(text) {
    if (!text || text.trim() === "{}") return;
    try {
      var parsed = JSON.parse(text);
      if (parsed && typeof parsed === "object" && Object.keys(parsed).length > 0) {
        onData(parsed);
      }
    } catch(ex) {}
  })
  .catch(function() {
    try {
      var x = localStorage.getItem("itin26v2-local");
      if (x) { var p = JSON.parse(x); if (p && Object.keys(p).length > 0) onData(p); }
    } catch(ex) {}
  });
}

function syncSave(data) {
  try { localStorage.setItem(SYNC_KEY + "-local", JSON.stringify(data)); } catch(e) {}
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(function() {
    var encoded = encodeURIComponent(JSON.stringify(data));
    fetch(APPS_URL + "?key=" + encodeURIComponent(SYNC_KEY) + "&value=" + encoded)
    .catch(function() {});
  }, 800);
}
var ST = {e:{}, c:{}, d:{}};
var MM = null, MT = null;

function normST() {
  if (!ST.e) ST.e = {};
  if (!ST.c) ST.c = {};
  if (!ST.d) ST.d = {};
}

function loadST() {
  syncLoad(function(data) {
    if (data) { ST = data; normST(); }
    renderAll();
    autoOpenToday();
  });
}

function saveST() {
  syncSave(ST);
}

function getDayById(id) {
  for (var i = 0; i < DAYS.length; i++) if (DAYS[i].id === id) return DAYS[i];
  return null;

/* ---- TIME SORT ---- */
/* Convert a time string to minutes since midnight for sorting.
   Handles "9:00 AM", "~10:30 AM", "Late morning", "Afternoon", "Evening" etc. */
function timeToMins(s) {
  if (!s) return 9999;
  s = s.replace(/^~/, "").trim().toUpperCase();
  /* Named slots */
  var named = {
    "EARLY MORNING":  5*60,  "MORNING":    8*60,
    "LATE MORNING":   10*60, "MIDDAY":     12*60,
    "NOON":           12*60, "AFTERNOON":  14*60,
    "LATE AFTERNOON": 16*60, "EVENING":    19*60,
    "NIGHT":          21*60, "LATE NIGHT": 23*60
  };
  if (named[s] !== undefined) return named[s];
  /* Try HH:MM AM/PM */
  var m = s.match(/(\d{1,2}):(\d{2})\s*(AM|PM)/);
  if (m) {
    var h = parseInt(m[1], 10);
    var min = parseInt(m[2], 10);
    var ampm = m[3];
    if (ampm === "PM" && h !== 12) h += 12;
    if (ampm === "AM" && h === 12) h = 0;
    return h * 60 + min;
  }
  /* Try HH AM/PM (no minutes) */
  var m2 = s.match(/(\d{1,2})\s*(AM|PM)/);
  if (m2) {
    var h2 = parseInt(m2[1], 10);
    var ampm2 = m2[2];
    if (ampm2 === "PM" && h2 !== 12) h2 += 12;
    if (ampm2 === "AM" && h2 === 12) h2 = 0;
    return h2 * 60;
  }
  return 9999; /* unrecognised - send to end */
}

function X(s) {
  if (!s) return "";
  var r = "";
  for (var i = 0; i < s.length; i++) {
    var c = s[i];
    if (c === "&") r += "&amp;";
    else if (c === "<") r += "&lt;";
    else if (c === ">") r += "&gt;";
    else if (c === '"') r += "&quot;";
    else r += c;
  }
  return r;
}

function makeTags(tg) {
  var h = "";
  for (var i = 0; i < tg.length; i++) {
    var v = tg[i];
    h += '<span class="tag tag-' + v + '">' + v.charAt(0).toUpperCase() + v.slice(1) + '</span>';
  }
  return h;
}

function dotCol(tg, cityCol) {
  if (tg && tg.indexOf("confirmed") >= 0) return "var(--green)";
  return cityCol;
}

function rowHTML(row, cityCol) {
  if (ST.d[row.id]) return "";
  var e = ST.e[row.id];
  var time = e ? e.t : row.t;
  var name = e ? e.n : row.n;
  var det  = e ? e.dt : row.dt;
  var tg   = e ? (e.ty ? [e.ty] : []) : (row.tg || []);
  var xtra = e ? '<span class="tag tag-edited">Edited</span>' : "";
  return '<div class="srow" id="sr-' + row.id + '">' +
    '<div class="stime">' + X(time) + '</div>' +
    '<div class="sdot" style="background:' + dotCol(tg, cityCol) + '"></div>' +
    '<div class="scont">' +
      '<div class="sname">' + X(name) + makeTags(tg) + xtra + '</div>' +
      (det ? '<div class="sdet">' + X(det) + '</div>' : '') +
    '</div>' +
    '<div class="ractions">' +
      '<button class="rbtn" onclick="openEdit(\'' + row.id + '\',event)">Edit</button>' +
      '<button class="rbtn del" onclick="openDel(\'' + row.id + '\',event)">Delete</button>' +
    '</div>' +
  '</div>';
}

function singleCustomRowHTML(dayId, c, cityCol) {
  var dc = c.ty ? (c.ty === "confirmed" ? "var(--green)" : cityCol) : cityCol;
  var tg2 = c.ty ? '<span class="tag tag-' + c.ty + '">' + c.ty.charAt(0).toUpperCase() + c.ty.slice(1) + '</span>' : "";
  return '<div class="srow" id="sr-' + c.id + '">' +
    '<div class="stime">' + X(c.t) + '</div>' +
    '<div class="sdot" style="background:' + dc + '"></div>' +
    '<div class="scont">' +
      '<div class="sname">' + X(c.n) + tg2 + '<span class="tag tag-custom">Custom</span></div>' +
      (c.dt ? '<div class="sdet">' + X(c.dt) + '</div>' : '') +
    '</div>' +
    '<div class="ractions">' +
      '<button class="rbtn" onclick="openEditCustom(\'' + dayId + '\',\'' + c.id + '\',event)">Edit</button>' +
      '<button class="rbtn del" onclick="delCustom(\'' + dayId + '\',\'' + c.id + '\',event)">Delete</button>' +
    '</div>' +
  '</div>';
}

function customRowsHTML(dayId, cityCol) {
  var arr = ST.c[dayId];
  if (!arr || !arr.length) return "";
  var h = "";
  for (var i = 0; i < arr.length; i++) h += singleCustomRowHTML(dayId, arr[i], cityCol);
  return h;
}

function dayHTML(dayId) {
  var d = getDayById(dayId);
  if (!d) return "";

  /* Build a unified list of row descriptors: {kind, rowId, time, ...} */
  var allRows = [];

  /* Base rows (not deleted) */
  var base = d.rows || [];
  for (var i = 0; i < base.length; i++) {
    var row = base[i];
    if (ST.d[row.id]) continue; /* deleted */
    var e = ST.e[row.id];
    var effectiveTime = e ? e.t : row.t;
    allRows.push({kind:"base", row:row, time:effectiveTime, mins:timeToMins(effectiveTime)});
  }

  /* Custom rows */
  var customs = ST.c[dayId] || [];
  for (var j = 0; j < customs.length; j++) {
    var c = customs[j];
    allRows.push({kind:"custom", dayId:dayId, c:c, time:c.t, mins:timeToMins(c.t)});
  }

  /* Stable sort by time */
  allRows.sort(function(a, b) { return a.mins - b.mins; });

  var rh = "";
  for (var k = 0; k < allRows.length; k++) {
    var item = allRows[k];
    if (item.kind === "base") {
      rh += rowHTML(item.row, d.col);
    } else {
      rh += singleCustomRowHTML(item.dayId, item.c, d.col);
    }
  }

  return '<div class="dcard" id="dc-' + dayId + '">' +
    '<div class="dhdr" onclick="toggleDay(this)">' +
      '<div class="dnum">' + d.num + '</div>' +
      '<div class="dtblock"><div class="dweekday">' + d.wd + '</div>' +
        (d.sb ? '<div class="dsub">' + d.sb + '</div>' : '') + '</div>' +
      '<div class="dfocus">' + (d.fc || "") + '</div>' +
      '<div class="dchev">&#9660;</div>' +
    '</div>' +
    '<div class="dbody" id="db-' + dayId + '">' + rh +
      (d.nt ? '<div class="dnote">' + d.nt + '</div>' : '') +
      '<button class="addbtn" onclick="openAdd(\'' + dayId + '\',event)">+ Add item to this day</button>' +
    '</div>' +
  '</div>';
}

function travelHTML(tc) {
  return '<div class="tcard">' +
    '<div class="ticon">' + tc.ic + '</div>' +
    '<div style="flex:1"><div class="troute">' + tc.rt + '</div><div class="tdetail">' + tc.dt2 + '</div></div>' +
    '<div class="tmeta"><div class="ttime">' + tc.tm + '</div><div class="tcode">' + tc.cd + '</div></div>' +

function renderAll() {
  var h = "";
  for (var si = 0; si < SECS.length; si++) {
    var sec = SECS[si];
    h += '<div class="city-sec" id="' + sec.id + '">';
    if (!sec.lbl) {
      h += '<div class="srule"><div class="srule-line"></div><div class="srule-lbl">Departure</div><div class="srule-line"></div></div>';
      if (sec.pre) h += travelHTML(sec.pre);
    } else {
      h += '<div class="city-hdr">' +
        '<div class="city-bar" style="background:' + sec.col + '"></div>' +
        '<div><div class="city-name">' + sec.lbl + '</div>' +
          '<div class="city-dates">' + sec.dates + '</div>' +
          '<div class="city-hotel">' + sec.hotel + '</div></div>' +
      '</div>';
    }
    for (var di = 0; di < sec.days.length; di++) h += dayHTML(sec.days[di]);
    if (sec.post) h += travelHTML(sec.post);
    h += '</div>';
  }
  document.getElementById("main").innerHTML = h;
}

}

function toggleEdit() {
  document.body.classList.toggle("emode");
  var btn = document.getElementById("editToggle");
  if (document.body.classList.contains("emode")) {
    btn.textContent = "Done editing";
    btn.classList.add("on");
  } else {
    btn.textContent = "Edit itinerary";
    btn.classList.remove("on");
  }
}

function openOverlay(title, time, name, det, type, showDel) {
  document.getElementById("mtitle").textContent = title;
  document.getElementById("mt").value  = time  || "";
  document.getElementById("mn").value  = name  || "";
  document.getElementById("md").value  = det   || "";
  document.getElementById("mty").value = type  || "";
  document.getElementById("mdel").style.display = showDel ? "inline-flex" : "none";
  document.getElementById("moverlay").classList.add("open");
  setTimeout(function(){ document.getElementById("mt").focus(); }, 60);
}

function closeModal() {
  document.getElementById("moverlay").classList.remove("open");
  MM = null; MT = null;
}

function openEdit(rowId, ev) {
  if (ev) ev.stopPropagation();
  var row = null;
  for (var i = 0; i < DAYS.length && !row; i++)
    for (var j = 0; j < DAYS[i].rows.length; j++)
      if (DAYS[i].rows[j].id === rowId) { row = DAYS[i].rows[j]; break; }
  var e = ST.e[rowId];
  MM = "edit"; MT = rowId;
  openOverlay("Edit item",
    e ? e.t  : (row ? row.t  : ""),
    e ? e.n  : (row ? row.n  : ""),
    e ? e.dt : (row ? row.dt : ""),
    e ? e.ty : (row && row.tg && row.tg.length ? row.tg[0] : ""),
    false);
}

function openEditCustom(dayId, rowId, ev) {
  if (ev) ev.stopPropagation();
  var arr = ST.c[dayId] || [], c = null;
  for (var i = 0; i < arr.length; i++) if (arr[i].id === rowId) { c = arr[i]; break; }
  if (!c) return;
  MM = "editc"; MT = {did:dayId, rid:rowId};
  openOverlay("Edit custom item", c.t, c.n, c.dt, c.ty, true);
}

function openDel(rowId, ev) {
  if (ev) ev.stopPropagation();
  var row = null;
  for (var i = 0; i < DAYS.length && !row; i++)
    for (var j = 0; j < DAYS[i].rows.length; j++)
      if (DAYS[i].rows[j].id === rowId) { row = DAYS[i].rows[j]; break; }
  var e = ST.e[rowId];
  MM = "del"; MT = rowId;
  openOverlay("Delete item",
    e ? e.t : (row ? row.t : ""),
    e ? e.n : (row ? row.n : ""),
    e ? e.dt : (row ? row.dt : ""),
    "", true);
}

function openAdd(dayId, ev) {
  if (ev) ev.stopPropagation();
  MM = "add"; MT = dayId;
  openOverlay("Add item to this day", "", "", "", "", false);
}

function findDayForRow(rowId) {
  for (var i = 0; i < DAYS.length; i++)
    for (var j = 0; j < DAYS[i].rows.length; j++)
      if (DAYS[i].rows[j].id === rowId) return DAYS[i].id;
  return null;
}

function doSave() {
  var t  = document.getElementById("mt").value.trim();
  var n  = document.getElementById("mn").value.trim();
  var dt = document.getElementById("md").value.trim();
  var ty = document.getElementById("mty").value;
  if (!n) { document.getElementById("mn").focus(); return; }

  if (MM === "edit") {
    ST.e[MT] = {t:t, n:n, dt:dt, ty:ty};
    saveST(); var did = findDayForRow(MT); renderAll(); if (did) reopenDay(did);
  } else if (MM === "editc") {
    var arr = ST.c[MT.did] || [];
    for (var i = 0; i < arr.length; i++)
      if (arr[i].id === MT.rid) { arr[i].t=t; arr[i].n=n; arr[i].dt=dt; arr[i].ty=ty; break; }
    ST.c[MT.did] = arr; saveST(); renderAll(); reopenDay(MT.did);
  } else if (MM === "add") {
    var nid = "x" + Date.now();
    if (!ST.c[MT]) ST.c[MT] = [];
    ST.c[MT].push({id:nid, t:t, n:n, dt:dt, ty:ty});
    saveST(); renderAll(); reopenDay(MT);
  }
  closeModal();
}

function doDelete() {
  if (MM === "del") {
    ST.d[MT] = 1; delete ST.e[MT];
    saveST(); renderAll();
  } else if (MM === "editc") {
    delCustom(MT.did, MT.rid, null); return;
  }
  closeModal();
}

function delCustom(dayId, rowId, ev) {
  if (ev) ev.stopPropagation();
  var arr = ST.c[dayId] || [];
  ST.c[dayId] = arr.filter(function(c){ return c.id !== rowId; });
  saveST(); renderAll(); reopenDay(dayId);
  closeModal();
}

document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeModal();
  if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) doSave();
});

function autoOpenToday() {
  var n = new Date();
  var td = n.getFullYear() + "-" + String(n.getMonth()+1).padStart(2,"0") + "-" + String(n.getDate()).padStart(2,"0");
  var MAP = {"2026-04-08":"d08","2026-04-09":"d09","2026-04-10":"d10","2026-04-11":"d11",
    "2026-04-12":"d12","2026-04-13":"d13","2026-04-14":"d14","2026-04-15":"d15",
    "2026-04-16":"d16","2026-04-17":"d17","2026-04-18":"d18","2026-04-19":"d19",
    "2026-04-20":"d20","2026-04-21":"d21","2026-04-22":"d22","2026-04-23":"d23","2026-04-24":"d24"};
  var did = MAP[td];
  if (!did) return;
  setTimeout(function() {
    reopenDay(did);
    var el = document.getElementById("dc-" + did);
    if (el) el.scrollIntoView({behavior:"smooth", block:"start"});
  }, 100);
}

loadST();
</script>
