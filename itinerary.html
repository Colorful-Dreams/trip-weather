.tdetail{font-size:12px;color:#9b9489;}
.tmeta{text-align:right;flex-shrink:0;}
.ttime{font-size:14px;font-weight:500;color:#1c1a17;}
.tcode{font-size:11px;color:#9b9489;margin-top:2px;}

.dsub{font-size:12px;color:#9b9489;margin-top:1px;}

.srow{display:flex;gap:12px;padding:8px 0;border-bottom:0.5px solid rgba(0,0,0,0.06);align-items:flex-start;}

function normST(){ if(!ST.e)ST.e={}; if(!ST.c)ST.c={}; if(!ST.d)ST.d={}; }

function syncLoad(){
  renderAll(); autoOpenToday();
  fetch(APPS_URL+"?key="+encodeURIComponent(SYNC_KEY))
  .then(function(r){return r.text();})
  .then(function(txt){
    if(!txt||txt.trim()=="{}") return;
    try{
      var d=JSON.parse(txt);
      if(d&&typeof d==="object"&&(Object.keys(d.e||{}).length||(Object.keys(d.c||{}).length)||(Object.keys(d.d||{}).length))){
        ST=d; normST(); renderAll();
      }
    }catch(ex){}
  }).catch(function(){
    try{var x=localStorage.getItem("itin26v2-local");if(x){ST=JSON.parse(x);normST();renderAll();}}catch(ex){}
  });
}

function saveST(){
  try{localStorage.setItem("itin26v2-local",JSON.stringify(ST));}catch(ex){}
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){
    var enc=encodeURIComponent(JSON.stringify(ST));

  },800);
}

/* ---- CSS vars for city colors ---- */
var CITY_COLS = {
  "var(--lisbon)":"#185FA5","var(--seville)":"#854F0B","var(--madrid)":"#534AB7",
  "var(--valencia)":"#3B6D11","var(--barcelona)":"#993556"
};
function resolveCol(c){ return CITY_COLS[c]||c; }

function getDayById(id){ for(var i=0;i<DAYS.length;i++) if(DAYS[i].id===id) return DAYS[i]; return null; }

function timeToMins(t){
  if(!t) return 9999;
  var s=t.replace(/^~/,"").trim().toUpperCase();
  var named={"MORNING":8*60,"LATE MORNING":10*60,"MIDDAY":12*60,"AFTERNOON":14*60,"LATE AFTERNOON":16*60,"EVENING":19*60,"NIGHT":21*60};
  if(named[s]!==undefined) return named[s];
  var m=s.match(/(\d{1,2}):(\d{2})\s*(AM|PM)/);
  if(m){var h=parseInt(m[1]),mn=parseInt(m[2]),ap=m[3];if(ap==="PM"&&h!==12)h+=12;if(ap==="AM"&&h===12)h=0;return h*60+mn;}
  return 9999;
}

function X(s){
  if(!s) return "";
  var r="";
  for(var i=0;i<s.length;i++){var c=s[i];if(c==="&")r+="&amp;";else if(c==="<")r+="&lt;";else if(c===">")r+="&gt;";else if(c==='"')r+="&quot;";else r+=c;}
  return r;
}

function makeTags(tg){
  var h="";
  for(var i=0;i<tg.length;i++){var v=tg[i];h+='<span class="tag tag-'+v+'">'+v.charAt(0).toUpperCase()+v.slice(1)+'</span>';}
  return h;
}

function dotCol(tg,city){
  if(tg&&tg.indexOf("confirmed")>=0) return "#1D9E75";
  return resolveCol(city);
}

function rowHTML(row,cityCol){
  if(ST.d[row.id]) return "";
  var e=ST.e[row.id];
  var time=e?e.t:row.t, name=e?e.n:row.n, det=e?e.dt:row.dt;
  var tg=e?(e.ty?[e.ty]:[]):(row.tg||[]);
  var xtra=e?'<span class="tag tag-edited">Edited</span>':"";
  return '<div class="srow" id="sr-'+row.id+'">'+
    '<div class="stime">'+X(time)+'</div>'+
    '<div class="sdot" style="background:'+dotCol(tg,cityCol)+'"></div>'+
    '<div class="scont"><div class="sname">'+X(name)+makeTags(tg)+xtra+'</div>'+
    (det?'<div class="sdet">'+X(det)+'</div>':'')+
    '</div>'+
    '<div class="ract">'+
    '<button class="ra" onclick="openEdit(\''+row.id+'\',event)">Edit</button>'+
    '<button class="ra del" onclick="openDel(\''+row.id+'\',event)">Delete</button>'+
    '</div></div>';
}

function customRowsHTML(dayId,cityCol){
  var arr=ST.c[dayId]; if(!arr||!arr.length) return "";
  var h="";
  arr.forEach(function(c){
    var dc=c.ty?(c.ty==="confirmed"?"#1D9E75":resolveCol(cityCol)):resolveCol(cityCol);
    var tg=c.ty?'<span class="tag tag-'+c.ty+'">'+c.ty.charAt(0).toUpperCase()+c.ty.slice(1)+'</span>':"";
    h+='<div class="srow" id="sr-'+c.id+'">'+
      '<div class="stime">'+X(c.t)+'</div>'+
      '<div class="sdot" style="background:'+dc+'"></div>'+
      '<div class="scont"><div class="sname">'+X(c.n)+tg+'<span class="tag tag-custom">Custom</span></div>'+
      (c.dt?'<div class="sdet">'+X(c.dt)+'</div>':'')+
      '</div>'+
      '<div class="ract">'+
      '<button class="ra" onclick="openEditCustom(\''+dayId+'\',\''+c.id+'\',event)">Edit</button>'+
      '<button class="ra del" onclick="delCustom(\''+dayId+'\',\''+c.id+'\',null)">Delete</button>'+
      '</div></div>';
  });
  return h;
}

function dayHTML(dayId){
  var d=getDayById(dayId); if(!d) return "";
  var allRows=[];
  (d.rows||[]).forEach(function(row){
    if(ST.d[row.id]) return;
    var e=ST.e[row.id];
    var eff=e?e.t:row.t;
    allRows.push({kind:"base",row:row,mins:timeToMins(eff)});
  });
  (ST.c[dayId]||[]).forEach(function(c){
    allRows.push({kind:"custom",dayId:dayId,c:c,mins:timeToMins(c.t)});
  });
  allRows.sort(function(a,b){return a.mins-b.mins;});
  var rh="";
  allRows.forEach(function(item){
    rh+=item.kind==="base"?rowHTML(item.row,d.col):
      (function(){
        var c=item.c,dc=c.ty?(c.ty==="confirmed"?"#1D9E75":resolveCol(d.col)):resolveCol(d.col);
        var tg=c.ty?'<span class="tag tag-'+c.ty+'">'+c.ty.charAt(0).toUpperCase()+c.ty.slice(1)+'</span>':"";
        return '<div class="srow" id="sr-'+c.id+'">'+
          '<div class="stime">'+X(c.t)+'</div>'+
          '<div class="sdot" style="background:'+dc+'"></div>'+
          '<div class="scont"><div class="sname">'+X(c.n)+tg+'<span class="tag tag-custom">Custom</span></div>'+
          (c.dt?'<div class="sdet">'+X(c.dt)+'</div>':'')+
          '</div>'+
          '<div class="ract">'+
          '<button class="ra" onclick="openEditCustom(\''+item.dayId+'\',\''+c.id+'\',event)">Edit</button>'+
          '<button class="ra del" onclick="delCustom(\''+item.dayId+'\',\''+c.id+'\',null)">Delete</button>'+
          '</div></div>';
      })();
  });
  return '<div class="dcard" id="dc-'+dayId+'">'+
    '<div class="dhdr" onclick="toggleDay(this)">'+
    '<div class="dnum">'+d.num+'</div>'+
    '<div class="dtblock"><div class="dweekday">'+d.wd+'</div>'+(d.sb?'<div class="dsub">'+d.sb+'</div>':'')+
    '</div><div class="dfocus">'+(d.fc||"")+'</div><div class="dchev">&#9660;</div></div>'+
    '<div class="dbody" id="db-'+dayId+'">'+rh+
    (d.nt?'<div class="dnote">'+d.nt+'</div>':'')+
    '<button class="addbtn" onclick="openAdd(\''+dayId+'\',event)">+ Add item to this day</button>'+
    '</div></div>';
}

function travelHTML(tc,isTrain){
  var cls=isTrain?"tcard train-card":"tcard";
  return '<div class="'+cls+'">'+
    '<div class="ticon">'+tc.ic+'</div>'+
    '<div style="flex:1"><div class="troute">'+tc.rt+'</div><div class="tdetail">'+tc.dt2+'</div></div>'+
    '<div class="tmeta"><div class="ttime">'+tc.tm+'</div><div class="tcode">'+tc.cd+'</div></div>'+
    '</div>';
}

function renderAll(){
  var h="";
  SECS.forEach(function(sec){
    h+='<div class="city-sec" id="'+sec.id+'">';
    if(!sec.lbl){
      h+='<div class="srule"><div class="srule-line"></div><div class="srule-lbl">Departure</div><div class="srule-line"></div></div>';
      if(sec.pre) h+=travelHTML(sec.pre,false);
    } else {
      h+='<div class="city-hdr">'+
        '<div class="city-bar" style="background:'+sec.col+'"></div>'+
        '<div><div class="city-name">'+sec.lbl+'</div>'+
        '<div class="city-dates">'+sec.dates+'</div>'+
        '<div class="city-hotel">'+sec.hotel+'</div></div></div>';
    }
    sec.days.forEach(function(did){ h+=dayHTML(did); });
    if(sec.post) h+=travelHTML(sec.post, sec.post.ic==="&#128646;");
    h+='</div>';
  });
  document.getElementById("main").innerHTML=h;
}

function toggleDay(hdr){
  var body=hdr.nextElementSibling;
  var op=body.classList.contains("open");
  hdr.classList.toggle("open",!op);
  body.classList.toggle("open",!op);
}

function toggleEdit(){
  document.body.classList.toggle("emode");
  var btn=document.getElementById("editToggle");
  if(document.body.classList.contains("emode")){btn.textContent="Done editing";btn.classList.add("on");}
  else{btn.textContent="Edit itinerary";btn.classList.remove("on");}
}

function reopenDay(dayId){
  var hdr=document.querySelector("#dc-"+dayId+" .dhdr");
  var body=document.getElementById("db-"+dayId);
  if(hdr&&body){hdr.classList.add("open");body.classList.add("open");}
}

function findDayForRow(rowId){
  for(var i=0;i<DAYS.length;i++)
    for(var j=0;j<DAYS[i].rows.length;j++)
      if(DAYS[i].rows[j].id===rowId) return DAYS[i].id;
  return null;
}

function openOverlay(title,time,name,det,type,showDel){
  document.getElementById("mtitle").textContent=title;
  document.getElementById("mt").value=time||"";
  document.getElementById("mn").value=name||"";
  document.getElementById("md").value=det||"";
  document.getElementById("mty").value=type||"";
  document.getElementById("mDb").style.display=showDel?"inline-flex":"none";
  document.getElementById("moverlay").classList.add("open");
  setTimeout(function(){document.getElementById("mt").focus();},60);
}

function closeModal(){document.getElementById("moverlay").classList.remove("open");MM=null;MT=null;}

function openEdit(rowId,ev){
  if(ev) ev.stopPropagation();
  var row=null;
  for(var i=0;i<DAYS.length&&!row;i++) for(var j=0;j<DAYS[i].rows.length;j++) if(DAYS[i].rows[j].id===rowId){row=DAYS[i].rows[j];break;}
  var e=ST.e[rowId];
  MM="edit";MT=rowId;
  openOverlay("Edit item",e?e.t:(row?row.t:""),e?e.n:(row?row.n:""),e?e.dt:(row?row.dt:""),e?e.ty:(row&&row.tg&&row.tg.length?row.tg[0]:""),false);
}

function openEditCustom(dayId,rowId,ev){
  if(ev) ev.stopPropagation();
  var arr=ST.c[dayId]||[],c=null;
  for(var i=0;i<arr.length;i++) if(arr[i].id===rowId){c=arr[i];break;}
  if(!c) return;
  MM="editc";MT={did:dayId,rid:rowId};
  openOverlay("Edit custom item",c.t,c.n,c.dt,c.ty,true);
}

function openDel(rowId,ev){
  if(ev) ev.stopPropagation();
  var row=null;
  for(var i=0;i<DAYS.length&&!row;i++) for(var j=0;j<DAYS[i].rows.length;j++) if(DAYS[i].rows[j].id===rowId){row=DAYS[i].rows[j];break;}
  var e=ST.e[rowId];
  MM="del";MT=rowId;
  openOverlay("Delete item",e?e.t:(row?row.t:""),e?e.n:(row?row.n:""),e?e.dt:(row?row.dt:""),"",true);
}

function openAdd(dayId,ev){
  if(ev) ev.stopPropagation();
  MM="add";MT=dayId;
  openOverlay("Add item to this day","","","","",false);
}

function doSave(){
  var t=document.getElementById("mt").value.trim();
  var n=document.getElementById("mn").value.trim();
  var dt=document.getElementById("md").value.trim();
  var ty=document.getElementById("mty").value;
  if(!n){document.getElementById("mn").focus();return;}
  if(MM==="edit"){
    ST.e[MT]={t:t,n:n,dt:dt,ty:ty};
    saveST();var did=findDayForRow(MT);renderAll();if(did)reopenDay(did);
  } else if(MM==="editc"){
    var arr=ST.c[MT.did]||[];
    for(var i=0;i<arr.length;i++) if(arr[i].id===MT.rid){arr[i].t=t;arr[i].n=n;arr[i].dt=dt;arr[i].ty=ty;break;}
    ST.c[MT.did]=arr;saveST();renderAll();reopenDay(MT.did);
  } else if(MM==="add"){
    var nid="x"+Date.now();
    if(!ST.c[MT]) ST.c[MT]=[];
    ST.c[MT].push({id:nid,t:t,n:n,dt:dt,ty:ty});
    saveST();renderAll();reopenDay(MT);
  }
  closeModal();
}

function doDelete(){
  if(MM==="del"){ST.d[MT]=1;delete ST.e[MT];saveST();renderAll();}
  else if(MM==="editc"){delCustom(MT.did,MT.rid,null);}
  closeModal();
}

function delCustom(dayId,rowId,ev){
  if(ev) ev.stopPropagation();
  var arr=ST.c[dayId]||[];
  ST.c[dayId]=arr.filter(function(c){return c.id!==rowId;});
  delete ST.e[rowId];
  saveST();renderAll();reopenDay(dayId);
  closeModal();
}

document.addEventListener("keydown",function(e){
  if(e.key==="Escape") closeModal();
  if(e.key==="Enter"&&(e.metaKey||e.ctrlKey)) doSave();
});

function autoOpenToday(){
  var n=new Date();
  var td=n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0");
  var MAP={"2026-04-08":"d08","2026-04-09":"d09","2026-04-10":"d10","2026-04-11":"d11",
    "2026-04-12":"d12","2026-04-13":"d13","2026-04-14":"d14","2026-04-15":"d15",
    "2026-04-16":"d16","2026-04-17":"d17","2026-04-18":"d18","2026-04-19":"d19",
    "2026-04-20":"d20","2026-04-21":"d21","2026-04-22":"d22","2026-04-23":"d23","2026-04-24":"d24"};
  var did=MAP[td]; if(!did) return;
  setTimeout(function(){
    reopenDay(did);
    var el=document.getElementById("dc-"+did);
    if(el) el.scrollIntoView({behavior:"smooth",block:"start"});
  },200);
}
