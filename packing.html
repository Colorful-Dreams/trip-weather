<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Packing List</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#faf8f4;color:#1c1a17;padding:16px;}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.progress-wrap{flex:1;min-width:200px;}
.progress-label{font-size:12px;color:#9b9489;margin-bottom:5px;}
.progress-bar{height:6px;background:#f1efe8;border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:#1D9E75;border-radius:99px;transition:width 0.3s;}
.progress-count{font-size:11px;color:#9b9489;margin-top:3px;}
.actions{display:flex;gap:6px;}
.act-btn{font-family:inherit;font-size:12px;font-weight:500;padding:6px 14px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.15);background:#fff;color:#5f5e5a;cursor:pointer;}
.act-btn:hover{background:#f5f5f3;}
.act-btn.danger{border-color:rgba(163,45,45,0.2);color:#a32d2d;}
.act-btn.danger:hover{background:#fcebeb;}
.weather-note{background:#E6F1FB;border-radius:10px;padding:10px 14px;font-size:12px;color:#185FA5;margin-bottom:16px;line-height:1.5;}
.cat-card{background:#fff;border:0.5px solid rgba(0,0,0,0.10);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.cat-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;}
.cat-header:hover{background:#faf8f4;}
.cat-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.cat-title{font-size:14px;font-weight:500;flex:1;}
.cat-count{font-size:12px;color:#9b9489;}
.cat-chev{font-size:11px;color:#9b9489;transition:transform 0.2s;}
.cat-header.open .cat-chev{transform:rotate(180deg);}
.cat-body{display:none;border-top:0.5px solid rgba(0,0,0,0.07);}
.cat-body.open{display:block;}
.item-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:0.5px solid rgba(0,0,0,0.05);cursor:pointer;transition:background 0.1s;}
.item-row:last-child{border-bottom:none;}
.item-row:hover{background:#faf8f4;}
.item-row.checked{opacity:0.45;}
.check-box{width:18px;height:18px;border-radius:5px;border:1.5px solid rgba(0,0,0,0.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.item-row.checked .check-box{background:#1D9E75;border-color:#1D9E75;}
.check-tick{color:#fff;font-size:11px;display:none;}
.item-row.checked .check-tick{display:block;}
.item-text{flex:1;font-size:13px;line-height:1.4;}
.item-row.checked .item-text{text-decoration:line-through;color:#9b9489;}
.item-tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:99px;background:#FAEEDA;color:#854F0B;margin-left:4px;white-space:nowrap;}
.del-btn{font-size:16px;color:#d3d1c7;background:none;border:none;cursor:pointer;padding:0 4px;flex-shrink:0;display:none;}
.del-btn:hover{color:#a32d2d;}
body.edit-mode .del-btn{display:block;}
.add-section{padding:12px 16px;border-top:0.5px solid rgba(0,0,0,0.07);}
.add-row{display:flex;gap:8px;flex-wrap:wrap;}
.add-input{flex:1;min-width:140px;font-family:inherit;font-size:13px;padding:7px 10px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.18);background:#faf8f4;color:#1c1a17;outline:none;}
.add-input:focus{border-color:#1D9E75;box-shadow:0 0 0 2px rgba(29,158,117,0.1);}
.add-select{font-family:inherit;font-size:12px;padding:7px 10px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.18);background:#faf8f4;color:#1c1a17;outline:none;}
.add-go{font-family:inherit;font-size:12px;font-weight:500;padding:7px 14px;border-radius:8px;border:none;background:#1D9E75;color:#fff;cursor:pointer;}
.add-go:hover{opacity:0.88;}
.edit-btn{font-family:inherit;font-size:12px;font-weight:500;padding:6px 14px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.15);background:#fff;color:#5f5e5a;cursor:pointer;}
.edit-btn.on{background:#1c1a17;color:#fff;border-color:#1c1a17;}
.packed-summary{text-align:center;padding:20px;font-size:14px;color:#1D9E75;font-weight:500;display:none;}
.sync-msg{font-size:11px;color:#9b9489;text-align:center;padding:4px;min-height:18px;}
.sync-msg.saving{color:#854F0B;}
.sync-msg.saved{color:#3B6D11;}
</style>
</head>
<body>

<div class="top-bar">
  <div class="progress-wrap">
    <div class="progress-label">Packing progress</div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="progress-count" id="prog-count">0 of 0 packed</div>
  </div>
  <div class="actions">
    <button class="act-btn" onclick="checkAll()">Check all</button>
    <button class="act-btn danger" onclick="clearAll()">Reset</button>
    <button class="edit-btn" id="editBtn" onclick="toggleEdit()">Edit</button>
  </div>
</div>

<div class="weather-note">
  Temps 60-75°F across all cities — Madrid runs slightly cooler in mornings and evenings. Pack lightweight layers.
</div>

<div id="list-container"></div>
<div class="packed-summary" id="packed-summary">All packed! Have an amazing trip.</div>
<div class="sync-msg" id="sync-msg"></div>

<script>
var APPS_URL = "https://script.google.com/macros/s/AKfycbzUDiET7vZZJrHpTydoR6hpBixpqP9yUK_qHlvLi-oIVKoPOAaf7YUTYm2ahZ1lnNeJ/exec";
var SYNC_KEY = "packing-state";
var saveTimer = null;

/* ---- State ---- */
var checkedState = {};
var customItems  = [];

/* ---- Sync ---- */
function syncMsg(m, cls) {
  var el = document.getElementById("sync-msg");
  el.textContent = m;
  el.className = "sync-msg" + (cls ? " " + cls : "");
}

function syncLoad() {
  render(); /* render base data immediately */
  fetch(APPS_URL + "?key=" + encodeURIComponent(SYNC_KEY))
  .then(function(r) { return r.text(); })
  .then(function(txt) {
    if (!txt || txt.trim() === "{}") return;
    try {
      var d = JSON.parse(txt);
      if (d && typeof d === "object") {
        if (d.checked) checkedState = d.checked;
        if (d.custom)  customItems  = d.custom;
        render();
      }
    } catch(e) {}
  })
  .catch(function() {
    try {
      var x = localStorage.getItem("packing-local");
      if (x) { var d = JSON.parse(x); if (d.checked) checkedState = d.checked; if (d.custom) customItems = d.custom; render(); }
    } catch(e) {}
  });
}

function syncSave() {
  var data = {checked: checkedState, custom: customItems};
  try { localStorage.setItem(SYNC_KEY + "-local", JSON.stringify(data)); } catch(e) {}
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(function() {
    var encoded = encodeURIComponent(JSON.stringify(data));
    fetch(APPS_URL + "?key=" + encodeURIComponent(SYNC_KEY) + "&value=" + encoded)
    .catch(function() {});
  }, 800);
}

/* ---- Base data ---- */
var CATS = [
  { id:"clothing", icon:"👔", bg:"#E6F1FB", title:"Clothing", items:[
    {id:"c1",  text:"Lightweight layers (2-3 options for layering)"},
    {id:"c2",  text:"One light jacket", tag:"Essential"},
    {id:"c3",  text:"Church-appropriate coverage (shoulders + knees)", tag:"Essential"},
    {id:"c4",  text:"One dressier dinner outfit"},
    {id:"c5",  text:"Casual daytime shirts (4-5)"},
    {id:"c6",  text:"Comfortable trousers / chinos (2-3 pairs)"},
    {id:"c7",  text:"Shorts or light pants for Valencia beach days"},
    {id:"c8",  text:"Bathing suit", tag:"Las Arenas spa"},
    {id:"c9",  text:"Socks and underwear (7+ days)"},
    {id:"c10", text:"Pajamas / sleepwear"}
  ]},
  { id:"shoes", icon:"👟", bg:"#EAF3DE", title:"Footwear", items:[
    {id:"s1", text:"Comfortable broken-in walking shoes", tag:"Essential"},
    {id:"s2", text:"Dressier shoes for dinners"},
    {id:"s3", text:"Sandals or casual slip-ons for Valencia"},
    {id:"s4", text:"Blister pads / moleskin", tag:"Essential"}
  ]},
  { id:"docs", icon:"📄", bg:"#EEEDFE", title:"Documents & money", items:[
    {id:"d1", text:"Passports (check expiry)", tag:"Essential"},
    {id:"d2", text:"Printed flight confirmations (UA 64, UA 121 - Conf AGTEMK)"},
    {id:"d3", text:"TAP booking code YUHL7A - printed"},
    {id:"d4", text:"Hotel confirmation printouts (all 5 hotels)"},
    {id:"d5", text:"Activity / restaurant reservations printed"},
    {id:"d6", text:"Travel insurance documents"},
    {id:"d7", text:"Credit cards + backup card"},
    {id:"d8", text:"Euros (cash for taxis, tips, small purchases)"},
    {id:"d9", text:"Emergency contact list"}
  ]},
  { id:"tech", icon:"🔌", bg:"#FAEEDA", title:"Tech & power", items:[
    {id:"t1", text:"European Type C/F power adapters (2)", tag:"Essential"},
    {id:"t2", text:"Phone chargers"},
    {id:"t3", text:"Portable battery / power bank"},
    {id:"t4", text:"Earbuds / headphones (for overnight flight)"},
    {id:"t5", text:"Camera or confirm phone camera ready"},
    {id:"t6", text:"Download offline maps (Lisbon, Seville, Madrid, Valencia, Barcelona)"},
    {id:"t7", text:"Download boarding passes offline"},
    {id:"t8", text:"Kindle / tablet for flights"}
  ]},
  { id:"health", icon:"💊", bg:"#FAECE7", title:"Health & toiletries", items:[
    {id:"h1",  text:"Prescription medications (full supply)", tag:"Essential"},
    {id:"h2",  text:"Pain reliever (ibuprofen / acetaminophen)"},
    {id:"h3",  text:"Antihistamines"},
    {id:"h4",  text:"Motion sickness tablets"},
    {id:"h5",  text:"Sunscreen (SPF 30+)"},
    {id:"h6",  text:"Lip balm with SPF"},
    {id:"h7",  text:"Hand sanitizer"},
    {id:"h8",  text:"Toothbrush, toothpaste, floss"},
    {id:"h9",  text:"Deodorant"},
    {id:"h10", text:"Shampoo / conditioner (travel size)"},
    {id:"h11", text:"Razor"},
    {id:"h12", text:"Skincare / moisturizer"},
    {id:"h13", text:"Blister pads (also in footwear - double-check)"}
  ]},
  { id:"luggage", icon:"🧳", bg:"#FBEAF0", title:"Luggage & carry-on", items:[
    {id:"l1", text:"One checked bag per traveler"},
    {id:"l2", text:"Personal item / carry-on with: passport, meds, charger, one change of clothes", tag:"Rail days"},
    {id:"l3", text:"Luggage tags on every bag", tag:"Essential"},
    {id:"l4", text:"TSA-approved toiletries bag (3-1-1 rule)"},
    {id:"l5", text:"Packing cubes or compression bags"},
    {id:"l6", text:"Reusable tote bag (for day trips and markets)"},
    {id:"l7", text:"Small crossbody bag or money belt for sightseeing"},
    {id:"l8", text:"Umbrella or packable rain layer", tag:"Barcelona"}
  ]},
  { id:"comfort", icon:"😴", bg:"#F1EFE8", title:"Flight comfort", items:[
    {id:"f1", text:"Neck pillow (for overnight EWR to LIS flight)"},
    {id:"f2", text:"Eye mask"},
    {id:"f3", text:"Ear plugs"},
    {id:"f4", text:"Light blanket or travel wrap"},
    {id:"f5", text:"Snacks for airport / flight"},
    {id:"f6", text:"Empty water bottle (fill after security)"}
  ]}
];

/* ---- Helpers ---- */
function allItemIds() {
  var ids = [];
  CATS.forEach(function(cat) { cat.items.forEach(function(item) { ids.push(item.id); }); });
  customItems.forEach(function(c) { ids.push(c.id); });
  return ids;
}

function countChecked() {
  var total = 0, checked = 0;
  allItemIds().forEach(function(id) { total++; if (checkedState[id]) checked++; });
  return {total: total, checked: checked};
}

function toggleItem(id, ev) {
  if (ev) ev.stopPropagation();
  checkedState[id] = !checkedState[id];
  syncSave();
  var row = document.getElementById("row-" + id);
  if (row) {
    row.classList.toggle("checked", !!checkedState[id]);
    var tick = row.querySelector(".check-tick");
    if (tick) tick.style.display = checkedState[id] ? "block" : "none";
  }
  updateProgress();
}

function updateProgress() {
  var c = countChecked();
  var pct = c.total > 0 ? Math.round(c.checked / c.total * 100) : 0;
  document.getElementById("prog-fill").style.width = pct + "%";
  document.getElementById("prog-count").textContent = c.checked + " of " + c.total + " packed — " + pct + "%";
  var summary = document.getElementById("packed-summary");
  if (summary) summary.style.display = (c.checked === c.total && c.total > 0) ? "block" : "none";
}

function checkAll() {
  allItemIds().forEach(function(id) { checkedState[id] = true; });
  syncSave(); render();
}

function clearAll() {
  if (!confirm("Reset all checkboxes?")) return;
  checkedState = {};
  syncSave(); render();
}

function toggleEdit() {
  document.body.classList.toggle("edit-mode");
  var btn = document.getElementById("editBtn");
  if (document.body.classList.contains("edit-mode")) { btn.textContent = "Done"; btn.classList.add("on"); }
  else { btn.textContent = "Edit"; btn.classList.remove("on"); }
}

function deleteCustomItem(id, ev) {
  if (ev) { ev.stopPropagation(); ev.preventDefault(); }
  customItems = customItems.filter(function(c) { return c.id !== id; });
  delete checkedState[id];
  syncSave(); render();
}

function addItem(catId) {
  var input  = document.getElementById("add-text-" + catId);
  var text   = input ? input.value.trim() : "";
  if (!text) { if (input) input.focus(); return; }
  var id = "custom-" + Date.now();
  customItems.push({id: id, catId: catId, text: text});
  input.value = "";
  syncSave(); render();
  var body = document.getElementById("body-" + catId);
  if (body) { body.classList.add("open"); body.previousElementSibling.classList.add("open"); }
}

/* ---- Render ---- */
function render() {
  var container = document.getElementById("list-container");
  var html = "";

  CATS.forEach(function(cat) {
    var catCustom = customItems.filter(function(c) { return c.catId === cat.id; });
    var allItems  = cat.items.concat(catCustom);
    var catChecked = allItems.filter(function(item) { return checkedState[item.id]; }).length;
    var isOpen = document.getElementById("body-" + cat.id) ?
      document.getElementById("body-" + cat.id).classList.contains("open") : false;

    html += '<div class="cat-card">';
    html += '<div class="cat-header' + (isOpen ? " open" : "") + '" onclick="toggleCat(\'' + cat.id + '\')">';
    html += '<div class="cat-icon" style="background:' + cat.bg + '">' + cat.icon + '</div>';
    html += '<div class="cat-title">' + cat.title + '</div>';
    html += '<div class="cat-count">' + catChecked + ' / ' + allItems.length + '</div>';
    html += '<div class="cat-chev">&#9660;</div>';
    html += '</div>';
    html += '<div class="cat-body' + (isOpen ? " open" : "") + '" id="body-' + cat.id + '">';

    allItems.forEach(function(item) {
      var isChecked = !!checkedState[item.id];
      var isCustom  = !!item.catId;
      html += '<div class="item-row' + (isChecked ? " checked" : "") + '" id="row-' + item.id + '" onclick="toggleItem(\'' + item.id + '\')">';
      html += '<div class="check-box"><span class="check-tick" style="display:' + (isChecked ? "block" : "none") + '">&#10003;</span></div>';
      html += '<div class="item-text">' + item.text;
      if (item.tag) html += '<span class="item-tag">' + item.tag + '</span>';
      if (isCustom) html += '<span class="item-tag" style="background:#E6F1FB;color:#185FA5;">Custom</span>';
      html += '</div>';
      if (isCustom) html += '<button class="del-btn" onclick="deleteCustomItem(\'' + item.id + '\', event)">&#215;</button>';
      html += '</div>';
    });

    html += '<div class="add-section">';
    html += '<div class="add-row">';
    html += '<input class="add-input" id="add-text-' + cat.id + '" type="text" placeholder="Add item..." onkeydown="if(event.key===\'Enter\')addItem(\'' + cat.id + '\')">';
    html += '<button class="add-go" onclick="addItem(\'' + cat.id + '\')">Add</button>';
    html += '</div></div>';
    html += '</div></div>';
  });

  container.innerHTML = html;
  updateProgress();
}

function toggleCat(catId) {
  var body = document.getElementById("body-" + catId);
  var hdr  = body ? body.previousElementSibling : null;
  if (!body) return;
  body.classList.toggle("open");
  if (hdr) hdr.classList.toggle("open");
}

/* ---- Boot ---- */
syncLoad();
</script>
</body>
</html>
