<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Packing List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: transparent;
      color: #1a1a18;
      padding: 16px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .progress-wrap {
      flex: 1;
      min-width: 160px;
    }

    .progress-label {
      font-size: 12px;
      color: #888780;
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
    }

    .progress-bar-bg {
      height: 6px;
      background: #f1efe8;
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: #1D9E75;
      border-radius: 99px;
      transition: width 0.3s ease;
    }

    .top-actions {
      display: flex;
      gap: 6px;
    }

    .action-btn {
      font-size: 12px;
      font-family: inherit;
      padding: 5px 12px;
      border-radius: 8px;
      border: 0.5px solid rgba(0,0,0,0.15);
      background: #fff;
      color: #5f5e5a;
      cursor: pointer;
    }
    .action-btn:hover { background: #f5f5f3; }
    .action-btn.danger { color: #a32d2d; border-color: rgba(163,45,45,0.2); }
    .action-btn.danger:hover { background: #fcebeb; }

    .weather-note {
      background: #E6F1FB;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: #185FA5;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .category-section {
      margin-bottom: 18px;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      user-select: none;
    }

    .category-icon {
      font-size: 15px;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .category-title {
      font-size: 13px;
      font-weight: 500;
      color: #1a1a18;
      flex: 1;
    }

    .category-count {
      font-size: 11px;
      color: #b4b2a9;
    }

    .category-toggle {
      font-size: 11px;
      color: #b4b2a9;
    }

    .items-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .item-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.10);
      border-radius: 8px;
      padding: 9px 12px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .item-row:hover { background: #fafaf8; }

    .item-row.checked {
      opacity: 0.45;
    }

    .item-checkbox {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 1.5px solid #D3D1C7;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .item-row.checked .item-checkbox {
      background: #1D9E75;
      border-color: #1D9E75;
    }

    .checkmark {
      display: none;
      width: 10px;
      height: 7px;
      border-left: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(-45deg) translate(1px, -1px);
    }

    .item-row.checked .checkmark { display: block; }

    .item-text {
      font-size: 13px;
      color: #1a1a18;
      flex: 1;
      line-height: 1.4;
    }

    .item-row.checked .item-text {
      text-decoration: line-through;
      color: #888780;
    }

    .item-tag {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 99px;
      background: #FAEEDA;
      color: #854F0B;
      flex-shrink: 0;
    }

    .divider {
      border: none;
      border-top: 0.5px solid rgba(0,0,0,0.07);
      margin: 4px 0 14px;
    }

    .packed-summary {
      text-align: center;
      font-size: 13px;
      color: #3B6D11;
      background: #EAF3DE;
      border-radius: 10px;
      padding: 12px;
      margin-top: 8px;
      display: none;
    }

    .add-item-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
      align-items: center;
    }

    .add-item-select {
      font-family: inherit;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 8px;
      border: 0.5px solid rgba(0,0,0,0.15);
      background: #fff;
      color: #5f5e5a;
      cursor: pointer;
      flex-shrink: 0;
    }

    .add-item-input {
      font-family: inherit;
      font-size: 13px;
      padding: 7px 12px;
      border-radius: 8px;
      border: 0.5px solid rgba(0,0,0,0.15);
      background: #fff;
      color: #1a1a18;
      flex: 1;
      outline: none;
    }
    .add-item-input:focus { border-color: #1D9E75; box-shadow: 0 0 0 2px rgba(29,158,117,0.12); }
    .add-item-input::placeholder { color: #b4b2a9; }

    .add-item-btn {
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 7px 14px;
      border-radius: 8px;
      border: none;
      background: #1D9E75;
      color: #fff;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .add-item-btn:hover { opacity: 0.88; }

    .custom-tag {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 99px;
      background: #E6F1FB;
      color: #185FA5;
      flex-shrink: 0;
    }

    .item-delete {
      font-size: 14px;
      color: #D3D1C7;
      cursor: pointer;
      flex-shrink: 0;
      line-height: 1;
      padding: 0 2px;
      background: none;
      border: none;
      font-family: inherit;
    }
    .item-delete:hover { color: #a32d2d; }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progress-text">0 of 0 packed</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>
  <div class="top-actions">
    <button class="action-btn" onclick="checkAll()">Check all</button>
    <button class="action-btn danger" onclick="clearAll()">Reset</button>
  </div>
</div>

<div class="weather-note">
  Temps 60&ndash;75&deg;F across all cities &mdash; Madrid runs slightly cooler in mornings &amp; evenings. Pack lightweight layers.
</div>

<div class="add-item-bar">
  <select class="add-item-select" id="add-category">
    <option value="clothing">Clothing</option>
    <option value="shoes">Footwear</option>
    <option value="documents">Documents &amp; money</option>
    <option value="tech">Tech &amp; power</option>
    <option value="health">Health &amp; toiletries</option>
    <option value="luggage">Luggage &amp; carry-on</option>
    <option value="comfort">Flight comfort</option>
  </select>
  <input class="add-item-input" type="text" id="add-item-text" placeholder="Add an item..." maxlength="100"/>
  <button class="add-item-btn" onclick="addItem()">Add</button>
</div>

<div id="checklist-container"></div>
<div class="packed-summary" id="packed-summary">All packed! Have an amazing trip. &#127963;</div>

<script>
var STORAGE_KEY = "pt-es-2026-packing";
var CUSTOM_KEY  = "pt-es-2026-custom";
var APPS_URL = "https://script.google.com/macros/s/AKfycbzUDiET7vZZJrHpTydoR6hpBixpqP9yUK_qHlvLi-oIVKoPOAaf7YUTYm2ahZ1lnNeJ/exec";
var SYNC_KEY = "packing-state";
var saveTimer = null;

function syncLoad(onData) {
  onData(null);
  fetch(APPS_URL + "?key=" + encodeURIComponent(SYNC_KEY))
  .then(function(r) { return r.text(); })
  .then(function(text) {
    if (!text || text.trim() === "{}") return;
    try {
      var parsed = JSON.parse(text);
      if (parsed && typeof parsed === "object" && Object.keys(parsed).length > 0) {
        onData(parsed);
      }
    } catch(ex) {}
  })
  .catch(function() {
    try {
      var x = localStorage.getItem("packing-local");
      if (x) { var p = JSON.parse(x); if (p && Object.keys(p).length > 0) onData(p); }
    } catch(ex) {}
  });
}

function syncSave(data) {
  try { localStorage.setItem("packing-local", JSON.stringify(data)); } catch(ex) {}
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(function() {
    fetch(APPS_URL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({key: SYNC_KEY, value: JSON.stringify(data)})
    }).catch(function() {});
  }, 800);

}

var categories = [
  {
    id: "clothing",
    icon: "&#128085;",
    iconBg: "#E6F1FB",
    title: "Clothing",
    items: [
      { id: "c1",  text: "Lightweight layers (2\u20133 options for layering)" },
      { id: "c2",  text: "One light jacket", tag: "Essential" },
      { id: "c3",  text: "Church-appropriate coverage (shoulders + knees)", tag: "Essential" },
      { id: "c4",  text: "One dressier dinner outfit" },
      { id: "c5",  text: "Casual daytime shirts (4\u20135)" },
      { id: "c6",  text: "Comfortable trousers / chinos (2\u20133 pairs)" },
      { id: "c7",  text: "Shorts or light pants for Valencia beach days" },
      { id: "c8",  text: "Bathing suit", tag: "Las Arenas spa" },
      { id: "c9",  text: "Socks and underwear (7+ days)" },
      { id: "c10", text: "Pajamas / sleepwear" }
    ]
  },
  {
    id: "shoes",
    icon: "&#128096;",
    iconBg: "#EAF3DE",
    title: "Footwear",
    items: [
      { id: "s1", text: "Comfortable broken-in walking shoes", tag: "Essential" },
      { id: "s2", text: "Dressier shoes for dinners" },
      { id: "s3", text: "Sandals or casual slip-ons for Valencia" },
      { id: "s4", text: "Blister pads / moleskin", tag: "Essential" }
    ]
  },
  {
    id: "documents",
    icon: "&#128196;",
    iconBg: "#EEEDFE",
    title: "Documents & money",
    items: [
      { id: "d1", text: "Passports (check expiry)", tag: "Essential" },
      { id: "d2", text: "Printed flight confirmations (UA 64 \u2022 AGTEMK, UA 121 \u2022 AGTEMK)" },
      { id: "d3", text: "TAP booking code YUHL7A \u2014 printed" },
      { id: "d4", text: "Hotel confirmation printouts (all 5 hotels)" },
      { id: "d5", text: "Activity / restaurant reservations printed" },
      { id: "d6", text: "Travel insurance documents" },
      { id: "d7", text: "Credit cards + backup card" },
      { id: "d8", text: "Euros (cash for taxis, tips, small purchases)" },
      { id: "d9", text: "Emergency contact list" }
    ]
  },
  {
    id: "tech",
    icon: "&#128267;",
    iconBg: "#FAEEDA",
    title: "Tech & power",
    items: [
      { id: "t1", text: "European Type C/F power adapters (2)", tag: "Essential" },
      { id: "t2", text: "Phone chargers" },
      { id: "t3", text: "Portable battery / power bank" },
      { id: "t4", text: "Earbuds / headphones (for overnight flight)" },
      { id: "t5", text: "Camera or confirm phone camera ready" },
      { id: "t6", text: "Download offline maps (Lisbon, Seville, Madrid, Valencia, Barcelona)" },
      { id: "t7", text: "Download boarding passes offline" },
      { id: "t8", text: "Kindle / tablet for flights" }
    ]
  },
  {
    id: "health",
    icon: "&#128138;",
    iconBg: "#FAECE7",
    title: "Health & toiletries",
    items: [
      { id: "h1", text: "Prescription medications (full supply)", tag: "Essential" },
      { id: "h2", text: "Pain reliever (ibuprofen / acetaminophen)" },
      { id: "h3", text: "Antihistamines" },
      { id: "h4", text: "Motion sickness tablets (if needed for overnight flight)" },
      { id: "h5", text: "Sunscreen (SPF 30+)" },
      { id: "h6", text: "Lip balm with SPF" },
      { id: "h7", text: "Hand sanitizer" },
      { id: "h8", text: "Toothbrush, toothpaste, floss" },
      { id: "h9", text: "Deodorant" },
      { id: "h10", text: "Shampoo / conditioner (travel size or rely on hotels)" },
      { id: "h11", text: "Razor" },
      { id: "h12", text: "Skincare / moisturizer" },
      { id: "h13", text: "Blister pads (also in footwear section \u2014 double-check)" }
    ]
  },
  {
    id: "luggage",
    icon: "&#129523;",
    iconBg: "#FBEAF0",
    title: "Luggage & carry-on",
    items: [
      { id: "l1", text: "One checked bag per traveler" },
      { id: "l2", text: "Personal item / carry-on with: passport, meds, charger, one change of clothes", tag: "Rail days" },
      { id: "l3", text: "Luggage tags on every bag", tag: "Essential" },
      { id: "l4", text: "TSA-approved toiletries bag (3-1-1 rule)" },
      { id: "l5", text: "Packing cubes or compression bags" },
      { id: "l6", text: "Reusable tote bag (for day trips and markets)" },
      { id: "l7", text: "Small crossbody bag or money belt for sightseeing" },
      { id: "l8", text: "Umbrella or packable rain layer", tag: "Barcelona" }
    ]
  },
  {
    id: "comfort",
    icon: "&#128756;",
    iconBg: "#F1EFE8",
    title: "Flight comfort",
    items: [
      { id: "f1", text: "Neck pillow (for overnight EWR\u2192LIS flight)" },
      { id: "f2", text: "Eye mask" },
      { id: "f3", text: "Ear plugs" },
      { id: "f4", text: "Light blanket or travel wrap" },
      { id: "f5", text: "Snacks for airport / flight" },
      { id: "f6", text: "Empty water bottle (fill after security)" }
    ]
  }
];

/* ── Persistence (Gist + localStorage fallback) ── */
function loadFromGist() {
  syncLoad(function(data) {
    if (data) {
      if (data.checked) checkedState = data.checked;
      if (data.custom)  customItems  = data.custom;
    }
    render();
  });
}

function saveChecked(state) {
  checkedState = state;
  syncSave({checked: checkedState, custom: customItems});
}

function saveCustom(list) {
  customItems = list;
  syncSave({checked: checkedState, custom: customItems});
}

var checkedState = loadChecked();
var customItems  = loadCustom();

/* ── Helpers ── */
function allItems() {
  var all = [];
  for (var i = 0; i < categories.length; i++) {
    for (var j = 0; j < categories[i].items.length; j++) {
      all.push(categories[i].items[j].id);
    }
  }
  for (var k = 0; k < customItems.length; k++) {
    all.push(customItems[k].id);
  }
  return all;
}

function customForCat(catId) {
  return customItems.filter(function(c) { return c.catId === catId; });
}

function esc(s) {
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ── Progress ── */
function updateProgress() {
  var ids   = allItems();
  var total = ids.length;
  var done  = 0;
  for (var i = 0; i < ids.length; i++) { if (checkedState[ids[i]]) done++; }
  var pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById("progress-text").textContent = done + " of " + total + " packed";
  document.getElementById("progress-pct").textContent  = pct + "%";
  document.getElementById("progress-fill").style.width  = pct + "%";
  document.getElementById("packed-summary").style.display = (done === total && total > 0) ? "block" : "none";

  for (var k = 0; k < categories.length; k++) {
    var cat = categories[k];
    var catItems = cat.items.concat(customForCat(cat.id));
    var catDone  = 0;
    for (var m = 0; m < catItems.length; m++) { if (checkedState[catItems[m].id]) catDone++; }
    var el = document.getElementById("count-" + cat.id);
    if (el) el.textContent = catDone + "/" + catItems.length;
  }
}

/* ── Toggle ── */
function toggleItem(id) {
  checkedState[id] = !checkedState[id];
  gistSave({checked: checkedState, custom: customItems});
  var row = document.getElementById("row-" + id);
  if (row) row.classList.toggle("checked", checkedState[id]);
  updateProgress();
}

/* ── Add item ── */
function addItem() {
  var input  = document.getElementById("add-item-text");
  var select = document.getElementById("add-category");
  var text   = (input.value || "").trim();
  if (!text) { input.focus(); return; }

  var catId  = select.value;
  var id     = "custom-" + Date.now();
  customItems.push({ id: id, catId: catId, text: text });
  saveCustom(customItems);

  input.value = "";
  input.focus();
  render();
}

/* Enter key submits */
document.addEventListener("DOMContentLoaded", function() {
  var input = document.getElementById("add-item-text");
  if (input) input.addEventListener("keydown", function(e) { if (e.key === "Enter") addItem(); });
});

/* ── Delete custom item ── */
function deleteCustomItem(id, event) {
  event.stopPropagation();
  customItems = customItems.filter(function(c) { return c.id !== id; });
  delete checkedState[id];
  gistSave({checked: checkedState, custom: customItems});
  render();
}

/* ── Check all / Reset ── */
function checkAll() {
  var ids = allItems();
  for (var i = 0; i < ids.length; i++) checkedState[ids[i]] = true;
  gistSave({checked: checkedState, custom: customItems});
  render();
}

function clearAll() {
  checkedState = {};
  gistSave({checked: checkedState, custom: customItems});
  render();
}

/* ── Render ── */
function itemRowHTML(item, isCustom) {
  var isChecked = !!checkedState[item.id];
  var deleteBtn = isCustom
    ? '<button class="item-delete" onclick="deleteCustomItem(\'' + item.id + '\', event)" title="Remove">×</button>'
    : '';
  var tag = isCustom
    ? '<span class="custom-tag">Custom</span>'
    : (item.tag ? '<span class="item-tag">' + esc(item.tag) + '</span>' : '');

  return '<div class="item-row' + (isChecked ? ' checked' : '') + '" id="row-' + item.id + '" onclick="toggleItem(\'' + item.id + '\')">'
    + '<div class="item-checkbox"><div class="checkmark"></div></div>'
    + '<span class="item-text">' + esc(item.text) + '</span>'
    + tag
    + deleteBtn
    + '</div>';
}

function render() {
  var container = document.getElementById("checklist-container");
  var html = "";

  for (var i = 0; i < categories.length; i++) {
    var cat      = categories[i];
    var customs  = customForCat(cat.id);
    var allCat   = cat.items.concat(customs);
    var catDone  = 0;
    for (var j = 0; j < allCat.length; j++) { if (checkedState[allCat[j].id]) catDone++; }

    html += '<div class="category-section">';
    html += '<div class="category-header">';
    html += '<div class="category-icon" style="background:' + cat.iconBg + '">' + cat.icon + '</div>';
    html += '<span class="category-title">' + cat.title + '</span>';
    html += '<span class="category-count" id="count-' + cat.id + '">' + catDone + '/' + allCat.length + '</span>';
    html += '</div>';
    html += '<div class="items-list">';

    for (var k = 0; k < cat.items.length; k++) {
      html += itemRowHTML(cat.items[k], false);
    }
    for (var m = 0; m < customs.length; m++) {
      html += itemRowHTML(customs[m], true);
    }

    html += '</div>';
    html += '<div class="divider"></div>';
    html += '</div>';
  }

  container.innerHTML = html;
  updateProgress();
}

loadFromGist();
</script>
</body>
</html>
