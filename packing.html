<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Packing List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: transparent;
      color: #1a1a18;
      padding: 16px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .progress-wrap {
      flex: 1;
      min-width: 160px;
    }

    .progress-label {
      font-size: 12px;
      color: #888780;
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
    }

    .progress-bar-bg {
      height: 6px;
      background: #f1efe8;
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: #1D9E75;
      border-radius: 99px;
      transition: width 0.3s ease;
    }

    .top-actions {
      display: flex;
      gap: 6px;
    }

    .action-btn {
      font-size: 12px;
      font-family: inherit;
      padding: 5px 12px;
      border-radius: 8px;
      border: 0.5px solid rgba(0,0,0,0.15);
      background: #fff;
      color: #5f5e5a;
      cursor: pointer;
    }
    .action-btn:hover { background: #f5f5f3; }
    .action-btn.danger { color: #a32d2d; border-color: rgba(163,45,45,0.2); }
    .action-btn.danger:hover { background: #fcebeb; }

    .weather-note {
      background: #E6F1FB;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: #185FA5;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .category-section {
      margin-bottom: 18px;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      user-select: none;
    }

    .category-icon {
      font-size: 15px;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .category-title {
      font-size: 13px;
      font-weight: 500;
      color: #1a1a18;
      flex: 1;
    }

    .category-count {
      font-size: 11px;
      color: #b4b2a9;
    }

    .category-toggle {
      font-size: 11px;
      color: #b4b2a9;
    }

    .items-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .item-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.10);
      border-radius: 8px;
      padding: 9px 12px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .item-row:hover { background: #fafaf8; }

    .item-row.checked {
      opacity: 0.45;
    }

    .item-checkbox {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 1.5px solid #D3D1C7;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .item-row.checked .item-checkbox {
      background: #1D9E75;
      border-color: #1D9E75;
    }

    .checkmark {
      display: none;
      width: 10px;
      height: 7px;
      border-left: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(-45deg) translate(1px, -1px);
    }

    .item-row.checked .checkmark { display: block; }

    .item-text {
      font-size: 13px;
      color: #1a1a18;
      flex: 1;
      line-height: 1.4;
    }

    .item-row.checked .item-text {
      text-decoration: line-through;
      color: #888780;
    }

    .item-tag {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 99px;
      background: #FAEEDA;
      color: #854F0B;
      flex-shrink: 0;
    }

    .divider {
      border: none;
      border-top: 0.5px solid rgba(0,0,0,0.07);
      margin: 4px 0 14px;
    }

    .packed-summary {
      text-align: center;
      font-size: 13px;
      color: #3B6D11;
      background: #EAF3DE;
      border-radius: 10px;
      padding: 12px;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progress-text">0 of 0 packed</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>
  <div class="top-actions">
    <button class="action-btn" onclick="checkAll()">Check all</button>
    <button class="action-btn danger" onclick="clearAll()">Reset</button>
  </div>
</div>

<div class="weather-note">
  Temps 60&ndash;75&deg;F across all cities &mdash; Madrid runs slightly cooler in mornings &amp; evenings. Pack lightweight layers.
</div>

<div id="checklist-container"></div>
<div class="packed-summary" id="packed-summary">All packed! Have an amazing trip. &#127963;</div>

<script>
var STORAGE_KEY = "pt-es-2026-packing";

var categories = [
  {
    id: "clothing",
    icon: "&#128085;",
    iconBg: "#E6F1FB",
    title: "Clothing",
    items: [
      { id: "c1",  text: "Lightweight layers (2\u20133 options for layering)" },
      { id: "c2",  text: "One light jacket", tag: "Essential" },
      { id: "c3",  text: "Church-appropriate coverage (shoulders + knees)", tag: "Essential" },
      { id: "c4",  text: "One dressier dinner outfit" },
      { id: "c5",  text: "Casual daytime shirts (4\u20135)" },
      { id: "c6",  text: "Comfortable trousers / chinos (2\u20133 pairs)" },
      { id: "c7",  text: "Shorts or light pants for Valencia beach days" },
      { id: "c8",  text: "Bathing suit", tag: "Las Arenas spa" },
      { id: "c9",  text: "Socks and underwear (7+ days)" },
      { id: "c10", text: "Pajamas / sleepwear" }
    ]
  },
  {
    id: "shoes",
    icon: "&#128096;",
    iconBg: "#EAF3DE",
    title: "Footwear",
    items: [
      { id: "s1", text: "Comfortable broken-in walking shoes", tag: "Essential" },
      { id: "s2", text: "Dressier shoes for dinners" },
      { id: "s3", text: "Sandals or casual slip-ons for Valencia" },
      { id: "s4", text: "Blister pads / moleskin", tag: "Essential" }
    ]
  },
  {
    id: "documents",
    icon: "&#128196;",
    iconBg: "#EEEDFE",
    title: "Documents & money",
    items: [
      { id: "d1", text: "Passports (check expiry)", tag: "Essential" },
      { id: "d2", text: "Printed flight confirmations (UA 64 \u2022 AGTEMK, UA 121 \u2022 AGTEMK)" },
      { id: "d3", text: "TAP booking code YUHL7A \u2014 printed" },
      { id: "d4", text: "Hotel confirmation printouts (all 5 hotels)" },
      { id: "d5", text: "Activity / restaurant reservations printed" },
      { id: "d6", text: "Travel insurance documents" },
      { id: "d7", text: "Credit cards + backup card" },
      { id: "d8", text: "Euros (cash for taxis, tips, small purchases)" },
      { id: "d9", text: "Emergency contact list" }
    ]
  },
  {
    id: "tech",
    icon: "&#128267;",
    iconBg: "#FAEEDA",
    title: "Tech & power",
    items: [
      { id: "t1", text: "European Type C/F power adapters (2)", tag: "Essential" },
      { id: "t2", text: "Phone chargers" },
      { id: "t3", text: "Portable battery / power bank" },
      { id: "t4", text: "Earbuds / headphones (for overnight flight)" },
      { id: "t5", text: "Camera or confirm phone camera ready" },
      { id: "t6", text: "Download offline maps (Lisbon, Seville, Madrid, Valencia, Barcelona)" },
      { id: "t7", text: "Download boarding passes offline" },
      { id: "t8", text: "Kindle / tablet for flights" }
    ]
  },
  {
    id: "health",
    icon: "&#128138;",
    iconBg: "#FAECE7",
    title: "Health & toiletries",
    items: [
      { id: "h1", text: "Prescription medications (full supply)", tag: "Essential" },
      { id: "h2", text: "Pain reliever (ibuprofen / acetaminophen)" },
      { id: "h3", text: "Antihistamines" },
      { id: "h4", text: "Motion sickness tablets (if needed for overnight flight)" },
      { id: "h5", text: "Sunscreen (SPF 30+)" },
      { id: "h6", text: "Lip balm with SPF" },
      { id: "h7", text: "Hand sanitizer" },
      { id: "h8", text: "Toothbrush, toothpaste, floss" },
      { id: "h9", text: "Deodorant" },
      { id: "h10", text: "Shampoo / conditioner (travel size or rely on hotels)" },
      { id: "h11", text: "Razor" },
      { id: "h12", text: "Skincare / moisturizer" },
      { id: "h13", text: "Blister pads (also in footwear section \u2014 double-check)" }
    ]
  },
  {
    id: "luggage",
    icon: "&#129523;",
    iconBg: "#FBEAF0",
    title: "Luggage & carry-on",
    items: [
      { id: "l1", text: "One checked bag per traveler" },
      { id: "l2", text: "Personal item / carry-on with: passport, meds, charger, one change of clothes", tag: "Rail days" },
      { id: "l3", text: "Luggage tags on every bag", tag: "Essential" },
      { id: "l4", text: "TSA-approved toiletries bag (3-1-1 rule)" },
      { id: "l5", text: "Packing cubes or compression bags" },
      { id: "l6", text: "Reusable tote bag (for day trips and markets)" },
      { id: "l7", text: "Small crossbody bag or money belt for sightseeing" },
      { id: "l8", text: "Umbrella or packable rain layer", tag: "Barcelona" }
    ]
  },
  {
    id: "comfort",
    icon: "&#128756;",
    iconBg: "#F1EFE8",
    title: "Flight comfort",
    items: [
      { id: "f1", text: "Neck pillow (for overnight EWR\u2192LIS flight)" },
      { id: "f2", text: "Eye mask" },
      { id: "f3", text: "Ear plugs" },
      { id: "f4", text: "Light blanket or travel wrap" },
      { id: "f5", text: "Snacks for airport / flight" },
      { id: "f6", text: "Empty water bottle (fill after security)" }
    ]
  }
];

function loadChecked() {
  try {
    var s = localStorage.getItem(STORAGE_KEY);
    return s ? JSON.parse(s) : {};
  } catch(e) { return {}; }
}

function saveChecked(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

var checkedState = loadChecked();

function allItemIds() {
  var ids = [];
  for (var i = 0; i < categories.length; i++) {
    for (var j = 0; j < categories[i].items.length; j++) {
      ids.push(categories[i].items[j].id);
    }
  }
  return ids;
}

function updateProgress() {
  var ids = allItemIds();
  var total = ids.length;
  var done = 0;
  for (var i = 0; i < ids.length; i++) {
    if (checkedState[ids[i]]) done++;
  }
  var pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById("progress-text").textContent = done + " of " + total + " packed";
  document.getElementById("progress-pct").textContent = pct + "%";
  document.getElementById("progress-fill").style.width = pct + "%";
  var summary = document.getElementById("packed-summary");
  summary.style.display = (done === total && total > 0) ? "block" : "none";

  for (var k = 0; k < categories.length; k++) {
    var cat = categories[k];
    var catDone = 0;
    for (var m = 0; m < cat.items.length; m++) {
      if (checkedState[cat.items[m].id]) catDone++;
    }
    var countEl = document.getElementById("count-" + cat.id);
    if (countEl) countEl.textContent = catDone + "/" + cat.items.length;
  }
}

function toggleItem(id) {
  checkedState[id] = !checkedState[id];
  saveChecked(checkedState);
  var row = document.getElementById("row-" + id);
  if (row) row.classList.toggle("checked", checkedState[id]);
  updateProgress();
}

function checkAll() {
  var ids = allItemIds();
  for (var i = 0; i < ids.length; i++) checkedState[ids[i]] = true;
  saveChecked(checkedState);
  render();
}

function clearAll() {
  checkedState = {};
  saveChecked(checkedState);
  render();
}

function render() {
  var container = document.getElementById("checklist-container");
  var html = "";

  for (var i = 0; i < categories.length; i++) {
    var cat = categories[i];
    var catDone = 0;
    for (var j = 0; j < cat.items.length; j++) {
      if (checkedState[cat.items[j].id]) catDone++;
    }

    html += '<div class="category-section">';
    html += '<div class="category-header">';
    html += '<div class="category-icon" style="background:' + cat.iconBg + '">' + cat.icon + '</div>';
    html += '<span class="category-title">' + cat.title + '</span>';
    html += '<span class="category-count" id="count-' + cat.id + '">' + catDone + '/' + cat.items.length + '</span>';
    html += '</div>';
    html += '<div class="items-list">';

    for (var k = 0; k < cat.items.length; k++) {
      var item = cat.items[k];
      var isChecked = !!checkedState[item.id];
      html += '<div class="item-row' + (isChecked ? ' checked' : '') + '" id="row-' + item.id + '" onclick="toggleItem(\'' + item.id + '\')">';
      html += '<div class="item-checkbox"><div class="checkmark"></div></div>';
      html += '<span class="item-text">' + item.text + '</span>';
      if (item.tag) html += '<span class="item-tag">' + item.tag + '</span>';
      html += '</div>';
    }

    html += '</div>';
    html += '<div class="divider"></div>';
    html += '</div>';
  }

  container.innerHTML = html;
  updateProgress();
}

render();
</script>
</body>
</html>
