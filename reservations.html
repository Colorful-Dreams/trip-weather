<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reservations</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: transparent;
      color: #1a1a18;
      padding: 16px;
    }

    .filter-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .filter-btn {
      font-size: 12px;
      font-weight: 500;
      padding: 5px 14px;
      border-radius: 99px;
      border: 0.5px solid rgba(0,0,0,0.15);
      background: #fff;
      color: #5f5e5a;
      cursor: pointer;
      font-family: inherit;
    }
    .filter-btn.active { background: #1a1a18; color: #fff; border-color: #1a1a18; }
    .filter-btn:hover:not(.active) { background: #f5f5f3; }

    .city-section { margin-bottom: 24px; }
    .city-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .city-label {
      font-size: 13px;
      font-weight: 500;
      padding: 4px 14px;
      border-radius: 99px;
      white-space: nowrap;
    }
    .city-lisbon    { background: #E6F1FB; color: #185FA5; }
    .city-seville   { background: #FAEEDA; color: #854F0B; }
    .city-madrid    { background: #EEEDFE; color: #534AB7; }
    .city-valencia  { background: #EAF3DE; color: #3B6D11; }
    .city-barcelona { background: #FBEAF0; color: #993556; }
    .city-line {
      flex: 1;
      height: 0.5px;
      background: rgba(0,0,0,0.08);
    }

    .res-card {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .res-card.past { opacity: 0.45; }
    .res-card.today { border: 1.5px solid #1D9E75; background: #f9fefc; }

    .res-time {
      font-size: 14px;
      font-weight: 500;
      color: #1a1a18;
      min-width: 64px;
      text-align: right;
      flex-shrink: 0;
    }
    .res-divider {
      width: 0.5px;
      height: 32px;
      background: rgba(0,0,0,0.1);
      flex-shrink: 0;
    }
    .res-main { flex: 1; min-width: 0; }
    .res-name {
      font-size: 14px;
      font-weight: 500;
      color: #1a1a18;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .res-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .type-pill {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
    }
    .type-dining    { background: #FAECE7; color: #993C1D; }
    .type-activity  { background: #EEEDFE; color: #534AB7; }
    .type-cocktails { background: #FAEEDA; color: #854F0B; }
    .type-show      { background: #FBEAF0; color: #993556; }

    .res-date-label {
      font-size: 11px;
      color: #b4b2a9;
    }
    .res-status {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .status-confirmed { background: #EAF3DE; color: #3B6D11; }
    .status-reserved  { background: #E6F1FB; color: #185FA5; }
    .status-planned   { background: #F1EFE8; color: #5F5E5A; }
    .status-today     { background: #E1F5EE; color: #085041; }

    .today-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #1D9E75;
      flex-shrink: 0;
    }

    .summary-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .summary-chip {
      background: #f5f5f3;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      color: #5f5e5a;
    }
    .summary-chip span {
      font-weight: 500;
      color: #1a1a18;
    }

    .hidden { display: none; }
  </style>
</head>
<body>

<div class="summary-row" id="summary-row"></div>

<div class="filter-row">
  <button class="filter-btn active" onclick="setFilter('all')">All</button>
  <button class="filter-btn" onclick="setFilter('dining')">Dining</button>
  <button class="filter-btn" onclick="setFilter('activity')">Activities</button>
  <button class="filter-btn" onclick="setFilter('show')">Shows</button>
  <button class="filter-btn" onclick="setFilter('cocktails')">Cocktails</button>
</div>

<div id="reservations-container"></div>

<script>
var reservations = [
  { city:"Lisbon",    cityClass:"city-lisbon",    date:"2026-04-10", dateLabel:"Fri Apr 10", time:"7:30 PM",  name:"SUD Lisboa Terrazza",       type:"dining",    status:"confirmed" },
  { city:"Lisbon",    cityClass:"city-lisbon",    date:"2026-04-10", dateLabel:"Fri Apr 10", time:"9:30 PM",  name:"Red Frog Speakeasy",        type:"cocktails", status:"planned",   note:"Reserve if possible" },
  { city:"Lisbon",    cityClass:"city-lisbon",    date:"2026-04-11", dateLabel:"Sat Apr 11", time:"9:00 AM",  name:"Jer\u00f3nimos Monastery",   type:"activity",  status:"reserved" },
  { city:"Lisbon",    cityClass:"city-lisbon",    date:"2026-04-11", dateLabel:"Sat Apr 11", time:"8:00 PM",  name:"O Faia",                    type:"dining",    status:"confirmed" },
  { city:"Lisbon",    cityClass:"city-lisbon",    date:"2026-04-12", dateLabel:"Sun Apr 12", time:"7:00 PM",  name:"Sala de Corte",             type:"dining",    status:"confirmed" },
  { city:"Seville",   cityClass:"city-seville",   date:"2026-04-14", dateLabel:"Tue Apr 14", time:"9:30 AM",  name:"Real Alc\u00e1zar",         type:"activity",  status:"reserved" },
  { city:"Seville",   cityClass:"city-seville",   date:"2026-04-14", dateLabel:"Tue Apr 14", time:"11:30 AM", name:"Seville Cathedral",         type:"activity",  status:"reserved" },
  { city:"Seville",   cityClass:"city-seville",   date:"2026-04-14", dateLabel:"Tue Apr 14", time:"12:30 PM", name:"La Giralda Climb",          type:"activity",  status:"reserved" },
  { city:"Seville",   cityClass:"city-seville",   date:"2026-04-14", dateLabel:"Tue Apr 14", time:"6:00 PM",  name:"Tablao El Arenal",          type:"show",      status:"confirmed" },
  { city:"Seville",   cityClass:"city-seville",   date:"2026-04-15", dateLabel:"Wed Apr 15", time:"8:15 PM",  name:"Rio Grande Restaurant",     type:"dining",    status:"confirmed" },
  { city:"Madrid",    cityClass:"city-madrid",    date:"2026-04-17", dateLabel:"Fri Apr 17", time:"10:00 AM", name:"Prado Museum",              type:"activity",  status:"reserved" },
  { city:"Madrid",    cityClass:"city-madrid",    date:"2026-04-17", dateLabel:"Fri Apr 17", time:"5:00 PM",  name:"Sobrino de Bot\u00edn",     type:"dining",    status:"confirmed" },
  { city:"Valencia",  cityClass:"city-valencia",  date:"2026-04-20", dateLabel:"Mon Apr 20", time:"7:30 PM",  name:"La Pepica",                 type:"dining",    status:"confirmed" },
  { city:"Barcelona", cityClass:"city-barcelona", date:"2026-04-23", dateLabel:"Thu Apr 23", time:"9:30 AM",  name:"Park G\u00fcell",           type:"activity",  status:"reserved" },
  { city:"Barcelona", cityClass:"city-barcelona", date:"2026-04-23", dateLabel:"Thu Apr 23", time:"3:45 PM",  name:"Sagrada Fam\u00edlia",      type:"activity",  status:"reserved" },
  { city:"Barcelona", cityClass:"city-barcelona", date:"2026-04-23", dateLabel:"Thu Apr 23", time:"9:00 PM",  name:"La Pedrera (Night Visit)",  type:"activity",  status:"planned",   note:"Planned reserved entry" },
  { city:"Barcelona", cityClass:"city-barcelona", date:"2026-04-24", dateLabel:"Fri Apr 24", time:"1:00 PM",  name:"Els 4 Gats",               type:"dining",    status:"confirmed" },
  { city:"Barcelona", cityClass:"city-barcelona", date:"2026-04-24", dateLabel:"Fri Apr 24", time:"7:00 PM",  name:"La Pepita",                type:"dining",    status:"confirmed" }
];

var currentFilter = "all";

function pad(n) { return n < 10 ? "0" + n : "" + n; }
function todayStr() {
  var n = new Date();
  return n.getFullYear() + "-" + pad(n.getMonth()+1) + "-" + pad(n.getDate());
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll(".filter-btn").forEach(function(b) {
    b.classList.toggle("active", b.textContent.toLowerCase() === f || (f === "all" && b.textContent === "All"));
  });
  render();
}

function statusLabel(s) {
  if (s === "confirmed") return "Confirmed";
  if (s === "reserved")  return "Reserved";
  return "Planned";
}
function statusClass(s) {
  if (s === "confirmed") return "status-confirmed";
  if (s === "reserved")  return "status-reserved";
  return "status-planned";
}

function render() {
  var today = todayStr();
  var container = document.getElementById("reservations-container");
  var cities = ["Lisbon","Seville","Madrid","Valencia","Barcelona"];
  var html = "";
  var totalShown = 0;
  var upcomingCount = 0;
  var todayCount = 0;

  for (var ci = 0; ci < cities.length; ci++) {
    var city = cities[ci];
    var cityItems = reservations.filter(function(r) {
      return r.city === city && (currentFilter === "all" || r.type === currentFilter);
    });
    if (cityItems.length === 0) continue;
    totalShown += cityItems.length;

    var firstItem = cityItems[0];

    html += '<div class="city-section">';
    html += '<div class="city-header">';
    html += '<span class="city-label ' + firstItem.cityClass + '">' + city + '</span>';
    html += '<div class="city-line"></div>';
    html += '</div>';

    for (var ri = 0; ri < cityItems.length; ri++) {
      var r = cityItems[ri];
      var isPast  = today > r.date;
      var isToday = today === r.date;
      if (!isPast) upcomingCount++;
      if (isToday) todayCount++;

      var cardClass = "res-card" + (isPast ? " past" : "") + (isToday ? " today" : "");
      var statClass = isToday ? "status-today" : statusClass(r.status);
      var statLabel = isToday ? "Today" : statusLabel(r.status);

      html += '<div class="' + cardClass + '">';
      if (isToday) html += '<div class="today-dot"></div>';
      html += '<div class="res-time">' + r.time + '</div>';
      html += '<div class="res-divider"></div>';
      html += '<div class="res-main">';
      html += '<div class="res-name">' + r.name + '</div>';
      html += '<div class="res-meta">';
      html += '<span class="type-pill type-' + r.type + '">' + r.type.charAt(0).toUpperCase() + r.type.slice(1) + '</span>';
      html += '<span class="res-date-label">' + r.dateLabel + '</span>';
      if (r.note) html += '<span class="res-date-label">&middot; ' + r.note + '</span>';
      html += '</div>';
      html += '</div>';
      html += '<span class="res-status ' + statClass + '">' + statLabel + '</span>';
      html += '</div>';
    }
    html += '</div>';
  }

  container.innerHTML = html;

  var summary = document.getElementById("summary-row");
  var confirmed = reservations.filter(function(r){ return r.status === "confirmed"; }).length;
  var reserved  = reservations.filter(function(r){ return r.status === "reserved";  }).length;
  summary.innerHTML =
    '<div class="summary-chip"><span>' + reservations.length + '</span> total bookings</div>' +
    '<div class="summary-chip"><span>' + confirmed + '</span> confirmed</div>' +
    '<div class="summary-chip"><span>' + reserved  + '</span> reserved entries</div>' +
    '<div class="summary-chip"><span>' + upcomingCount + '</span> upcoming</div>';
}

render();
</script>
</body>
</html>
