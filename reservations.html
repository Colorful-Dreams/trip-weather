<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reservations - Portugal &amp; Spain 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:transparent;color:#1a1a18;padding:16px;}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;}
.fbtn{font-size:12px;font-weight:500;padding:5px 14px;border-radius:99px;border:0.5px solid rgba(0,0,0,0.15);background:#fff;color:#5f5e5a;cursor:pointer;font-family:inherit;}
.fbtn.active{background:#1a1a18;color:#fff;border-color:#1a1a18;}
.fbtn:hover:not(.active){background:#f5f5f3;}
.hdr-right{display:flex;gap:8px;align-items:center;}
.edit-toggle{font-family:inherit;font-size:12px;font-weight:500;padding:6px 14px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.15);background:#fff;color:#5f5e5a;cursor:pointer;}
.edit-toggle.on{background:#1a1a18;color:#fff;border-color:#1a1a18;}
.add-res-btn{font-family:inherit;font-size:12px;font-weight:500;padding:6px 14px;border-radius:8px;border:none;background:#1D9E75;color:#fff;cursor:pointer;display:none;}
.add-res-btn:hover{opacity:0.88;}
body.emode .add-res-btn{display:inline-block;}
.summary-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.schip{background:#f5f5f3;border-radius:8px;padding:8px 14px;font-size:13px;color:#5f5e5a;}
.schip span{font-weight:500;color:#1a1a18;}
.city-section{margin-bottom:22px;}
.city-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.city-label{font-size:13px;font-weight:500;padding:4px 14px;border-radius:99px;white-space:nowrap;}
.cl-l{background:#E6F1FB;color:#185FA5;}
.cl-s{background:#FAEEDA;color:#854F0B;}
.cl-m{background:#EEEDFE;color:#534AB7;}
.cl-v{background:#EAF3DE;color:#3B6D11;}
.cl-b{background:#FBEAF0;color:#993556;}
.city-line{flex:1;height:0.5px;background:rgba(0,0,0,0.08);}
.res-card{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;padding:13px 16px;margin-bottom:7px;display:flex;align-items:center;gap:12px;}
.res-card.past{opacity:0.45;}
.res-card.today{border:1.5px solid #1D9E75;background:#f9fefc;}
.res-time{font-size:14px;font-weight:500;color:#1a1a18;min-width:60px;text-align:right;flex-shrink:0;}
.res-div{width:0.5px;height:30px;background:rgba(0,0,0,0.1);flex-shrink:0;}
.res-main{flex:1;min-width:0;}
.res-name{font-size:14px;font-weight:500;color:#1a1a18;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px;}
.res-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.type-pill{font-size:11px;padding:2px 8px;border-radius:99px;}
.tp-dining{background:#FAECE7;color:#993C1D;}
.tp-activity{background:#EEEDFE;color:#534AB7;}
.tp-cocktails{background:#FAEEDA;color:#854F0B;}
.tp-show{background:#FBEAF0;color:#993556;}
.res-dl{font-size:11px;color:#b4b2a9;}
.res-status{font-size:11px;font-weight:500;padding:2px 8px;border-radius:6px;flex-shrink:0;}
.st-confirmed{background:#EAF3DE;color:#3B6D11;}
.st-reserved{background:#E6F1FB;color:#185FA5;}
.st-planned{background:#F1EFE8;color:#5F5E5A;}
.st-today{background:#E1F5EE;color:#085041;}
.today-dot{width:7px;height:7px;border-radius:50%;background:#1D9E75;flex-shrink:0;}
.custom-tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:99px;background:#E6F1FB;color:#185FA5;margin-left:4px;}
.ract{display:none;gap:4px;flex-shrink:0;margin-left:4px;}
body.emode .ract{display:flex;}
.ra{font-family:inherit;font-size:11px;padding:3px 8px;border-radius:5px;border:0.5px solid rgba(0,0,0,0.13);cursor:pointer;background:#fff;color:#5f5e5a;line-height:1.4;}
.ra:hover{background:#f5f5f3;}
.ra.del{color:#a32d2d;border-color:rgba(163,45,45,0.2);}
.ra.del:hover{background:#fcebeb;}
.sstatus{font-size:11px;color:#b4b2a9;text-align:center;margin-top:10px;min-height:16px;}
.sstatus.saving{color:#854F0B;}
.sstatus.saved{color:#3B6D11;}
.sstatus.err{color:#a32d2d;}
.mov{display:none;position:fixed;inset:0;background:rgba(20,18,15,0.5);z-index:500;align-items:center;justify-content:center;padding:16px;}
.mov.open{display:flex;}
.modal{background:#fff;border-radius:16px;padding:22px;width:100%;max-width:440px;box-shadow:0 8px 32px rgba(0,0,0,0.14);}
.mtitle{font-size:15px;font-weight:500;color:#1a1a18;margin-bottom:14px;}
.mf{margin-bottom:12px;}
.mf label{display:block;font-size:11px;font-weight:500;color:#9b9489;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;}
.mf input,.mf select{width:100%;font-family:inherit;font-size:13px;padding:8px 10px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.18);color:#1a1a18;background:#faf8f4;outline:none;}
.mf input:focus,.mf select:focus{border-color:#1D9E75;box-shadow:0 0 0 2px rgba(29,158,117,0.12);}
.mfr{display:flex;gap:10px;}
.mfr .mf{flex:1;}
.macts{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap;}
.mb{font-family:inherit;font-size:13px;font-weight:500;padding:8px 16px;border-radius:8px;cursor:pointer;border:none;}
.mb.cancel{background:#f5f5f3;color:#5f5e5a;}
.mb.save{background:#1a1a18;color:#fff;}
.mb.danger{background:#fcebeb;color:#a32d2d;margin-right:auto;}
</style>
</head>
<body>

<div class="toolbar">
  <div class="filter-row">
    <button class="fbtn active" onclick="setFilter('all')">All</button>
    <button class="fbtn" onclick="setFilter('dining')">Dining</button>
    <button class="fbtn" onclick="setFilter('activity')">Activities</button>
    <button class="fbtn" onclick="setFilter('show')">Shows</button>
    <button class="fbtn" onclick="setFilter('cocktails')">Cocktails</button>
  </div>
  <div class="hdr-right">
    <button class="add-res-btn" onclick="openAdd()">+ Add reservation</button>
    <button class="edit-toggle" id="editToggle" onclick="toggleEdit()">Edit</button>
  </div>
</div>

<div class="summary-row" id="summary-row"></div>
<div id="container"></div>
<div class="sstatus" id="ss"></div>

<div class="mov" id="mov" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mtitle" id="mtitle">Add reservation</div>
    <div class="mfr">
      <div class="mf"><label>City</label>
        <select id="mCity"><option value="Lisbon">Lisbon</option><option value="Seville">Seville</option><option value="Madrid">Madrid</option><option value="Valencia">Valencia</option><option value="Barcelona">Barcelona</option></select>
      </div>
      <div class="mf"><label>Date</label><input id="mDate" type="date" min="2026-04-09" max="2026-04-25"/></div>
    </div>
    <div class="mfr">
      <div class="mf"><label>Time</label><input id="mTime" type="text" placeholder="e.g. 7:30 PM"/></div>
      <div class="mf"><label>Type</label>
        <select id="mType"><option value="dining">Dining</option><option value="activity">Activity</option><option value="show">Show</option><option value="cocktails">Cocktails</option></select>
      </div>
    </div>
    <div class="mf"><label>Name / venue</label><input id="mName" type="text" placeholder="Restaurant or activity name"/></div>
    <div class="mfr">
      <div class="mf"><label>Status</label>
        <select id="mStatus"><option value="confirmed">Confirmed</option><option value="reserved">Reserved</option><option value="planned">Planned</option></select>
      </div>
      <div class="mf"><label>Note (optional)</label><input id="mNote" type="text" placeholder="Any note"/></div>
    </div>
    <div class="macts">
      <button class="mb danger" id="mDb" onclick="doDelete()" style="display:none">Delete</button>
      <button class="mb cancel" onclick="closeModal()">Cancel</button>
      <button class="mb save" onclick="doSave()">Save</button>
    </div>
  </div>
</div>

<script>
var APPS_URL = "https://script.google.com/macros/s/AKfycbzUDiET7vZZJrHpTydoR6hpBixpqP9yUK_qHlvLi-oIVKoPOAaf7YUTYm2ahZ1lnNeJ/exec";
var SYNC_KEY = "reservations-state";
var saveTimer = null;

function syncLoad(onData) {
  onData(null);
  fetch(APPS_URL + "?key=" + encodeURIComponent(SYNC_KEY))
  .then(function(r) { return r.text(); })
  .then(function(text) {
    if (!text || text.trim() === "{}") return;
    try {
      var parsed = JSON.parse(text);
      if (parsed && typeof parsed === "object" && Object.keys(parsed).length > 0) {
        onData(parsed);
      }
    } catch(ex) {}
  })
  .catch(function() {
    try {
      var x = localStorage.getItem("reservations-local");
      if (x) { var p = JSON.parse(x); if (p && Object.keys(p).length > 0) onData(p); }
    } catch(ex) {}
  });
}

function syncSave(data) {
  try { localStorage.setItem("reservations-local", JSON.stringify(data)); } catch(ex) {}
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(function() {
    fetch(APPS_URL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({key: SYNC_KEY, value: JSON.stringify(data)})
    }).catch(function() {});
  }, 800);
}
var ST={edits:{},custom:[],deleted:{}};
var MM=null,MT=null;
var BASE=[
  {id:"r01",city:"Lisbon",date:"2026-04-10",time:"7:30 PM",name:"SUD Lisboa Terrazza",type:"dining",status:"confirmed"},
  {id:"r02",city:"Lisbon",date:"2026-04-10",time:"9:30 PM",name:"Red Frog Speakeasy",type:"cocktails",status:"planned",note:"Reserve if possible"},
  {id:"r03",city:"Lisbon",date:"2026-04-11",time:"9:00 AM",name:"Jer\u00f3nimos Monastery",type:"activity",status:"reserved"},
  {id:"r04",city:"Lisbon",date:"2026-04-11",time:"8:00 PM",name:"O Faia",type:"dining",status:"confirmed"},
  {id:"r05",city:"Lisbon",date:"2026-04-12",time:"7:00 PM",name:"Sala de Corte",type:"dining",status:"confirmed"},
  {id:"r06",city:"Seville",date:"2026-04-14",time:"9:30 AM",name:"Real Alc\u00e1zar",type:"activity",status:"reserved"},
  {id:"r07",city:"Seville",date:"2026-04-14",time:"11:30 AM",name:"Seville Cathedral",type:"activity",status:"reserved"},
  {id:"r08",city:"Seville",date:"2026-04-14",time:"12:30 PM",name:"La Giralda Climb",type:"activity",status:"reserved"},
  {id:"r09",city:"Seville",date:"2026-04-14",time:"6:00 PM",name:"Tablao El Arenal",type:"show",status:"confirmed"},
  {id:"r10",city:"Seville",date:"2026-04-15",time:"8:15 PM",name:"Rio Grande Restaurant",type:"dining",status:"confirmed"},
  {id:"r11",city:"Madrid",date:"2026-04-17",time:"10:00 AM",name:"Prado Museum",type:"activity",status:"reserved"},
  {id:"r12",city:"Madrid",date:"2026-04-17",time:"5:00 PM",name:"Sobrino de Bot\u00edn",type:"dining",status:"confirmed"},
  {id:"r13",city:"Valencia",date:"2026-04-20",time:"7:30 PM",name:"La Pepica",type:"dining",status:"confirmed"},
  {id:"r14",city:"Barcelona",date:"2026-04-23",time:"9:30 AM",name:"Park G\u00fcell",type:"activity",status:"reserved"},
  {id:"r15",city:"Barcelona",date:"2026-04-23",time:"3:45 PM",name:"Sagrada Fam\u00edlia",type:"activity",status:"reserved"},
  {id:"r16",city:"Barcelona",date:"2026-04-23",time:"9:00 PM",name:"La Pedrera (Night Visit)",type:"activity",status:"planned",note:"Planned reserved entry"},
  {id:"r17",city:"Barcelona",date:"2026-04-24",time:"1:00 PM",name:"Els 4 Gats",type:"dining",status:"confirmed"},
  {id:"r18",city:"Barcelona",date:"2026-04-24",time:"7:00 PM",name:"La Pepita",type:"dining",status:"confirmed"}
];

function normST(){if(!ST.edits)ST.edits={};if(!ST.custom)ST.custom=[];if(!ST.deleted)ST.deleted={}; }

function loadST(){
  syncLoad(function(data){
    if(data){ST=data;normST();}
    renderAll();
  });
}

function saveST(){
  syncSave(ST);
}


function allRes(){
  var r=[];
  BASE.forEach(function(res){if(ST.deleted[res.id])return;var e=ST.edits[res.id];r.push(e?Object.assign({},res,e):Object.assign({},res));});
  ST.custom.forEach(function(c){r.push(Object.assign({},c));});
  return r;
}

function timeToMins(t){
  if(!t)return 9999;
  var s=t.replace(/^~/,"").trim().toUpperCase();
  var m=s.match(/(\d{1,2}):(\d{2})\s*(AM|PM)/);
  if(m){var h=parseInt(m[1]),mn=parseInt(m[2]),ap=m[3];if(ap==="PM"&&h!==12)h+=12;if(ap==="AM"&&h===12)h=0;return h*60+mn;}
  var m2=s.match(/(\d{1,2})\s*(AM|PM)/);
  if(m2){var h2=parseInt(m2[1]),ap2=m2[2];if(ap2==="PM"&&h2!==12)h2+=12;if(ap2==="AM"&&h2===12)h2=0;return h2*60;}
  return 9999;
}

function pad(n){return n<10?"0"+n:""+n;}
function todayStr(){var n=new Date();return n.getFullYear()+"-"+pad(n.getMonth()+1)+"-"+pad(n.getDate());}
function dateLabel(s){var d=new Date(s+"T12:00:00Z");return WDAYS[d.getUTCDay()]+" "+MONTHS[d.getUTCMonth()]+" "+d.getUTCDate();}
function X(s){if(!s)return "";var r="";for(var i=0;i<s.length;i++){var c=s[i];if(c==="&")r+="&amp;";else if(c==="<")r+="&lt;";else if(c===">")r+="&gt;";else if(c==='"')r+="&quot;";else r+=c;}return r;}

function setFilter(f){
  CF=f;
  document.querySelectorAll(".fbtn").forEach(function(b){
    b.classList.toggle("active",(f==="all"&&b.textContent==="All")||(f!=="all"&&b.textContent.toLowerCase()===f));
  });
  renderAll();
}

function stLabel(s){if(s==="confirmed")return "Confirmed";if(s==="reserved")return "Reserved";return "Planned";}
function stClass(s){if(s==="confirmed")return "st-confirmed";if(s==="reserved")return "st-reserved";return "st-planned";}

function renderAll(){
  var today=todayStr();
  var all=allRes();
  var cities=["Lisbon","Seville","Madrid","Valencia","Barcelona"];
  var html="";
  var upcomingCount=0;

  cities.forEach(function(city){
    var items=all.filter(function(r){return r.city===city&&(CF==="all"||r.type===CF);});
    if(!items.length)return;
    items.sort(function(a,b){if(a.date!==b.date)return a.date<b.date?-1:1;return timeToMins(a.time)-timeToMins(b.time);});
    items.forEach(function(r){if(today<=r.date)upcomingCount++;});

    var cc=CITY_CLS[city]||"cl-l";
    html+='<div class="city-section"><div class="city-header"><span class="city-label '+cc+'">'+city+'</span><div class="city-line"></div></div>';

    items.forEach(function(r){
      var isPast=today>r.date,isToday=today===r.date;
      var isCustom=r.id&&r.id.charAt(0)==="c";
      var sc=isToday?"st-today":stClass(r.status);
      var sl=isToday?"Today":stLabel(r.status);
      var dl=dateLabel(r.date);
      html+='<div class="res-card'+(isPast?" past":"")+(isToday?" today":"")+'">';
      if(isToday)html+='<div class="today-dot"></div>';
      html+='<div class="res-time">'+(r.time||"—")+'</div>';
      html+='<div class="res-div"></div>';
      html+='<div class="res-main"><div class="res-name">'+X(r.name)+(isCustom?'<span class="custom-tag">Custom</span>':'')+'</div>';
      html+='<div class="res-meta"><span class="type-pill tp-'+X(r.type)+'">'+X(r.type.charAt(0).toUpperCase()+r.type.slice(1))+'</span>';
      html+='<span class="res-dl">'+dl+'</span>';
      if(r.note)html+='<span class="res-dl">· '+X(r.note)+'</span>';
      html+='</div></div>';
      html+='<span class="res-status '+sc+'">'+sl+'</span>';
      html+='<div class="ract"><button class="ra" onclick="openEdit(\''+X(r.id)+'\')">Edit</button></div>';
      html+='</div>';
    });
    html+='</div>';
  });

  if(!html)html='<div style="text-align:center;padding:32px;font-size:13px;color:#9b9489;">No reservations match this filter.</div>';
  document.getElementById("container").innerHTML=html;

  var confirmed=all.filter(function(r){return r.status==="confirmed";}).length;
  var reserved=all.filter(function(r){return r.status==="reserved";}).length;
  document.getElementById("summary-row").innerHTML=
    '<div class="schip"><span>'+all.length+'</span> total bookings</div>'+
    '<div class="schip"><span>'+confirmed+'</span> confirmed</div>'+
    '<div class="schip"><span>'+reserved+'</span> reserved entries</div>'+
    '<div class="schip"><span>'+upcomingCount+'</span> upcoming</div>';
}

function toggleEdit(){
  document.body.classList.toggle("emode");
  var btn=document.getElementById("editToggle");
  if(document.body.classList.contains("emode")){btn.textContent="Done";btn.classList.add("on");}
  else{btn.textContent="Edit";btn.classList.remove("on");}
}

function findRes(id){var all=allRes();for(var i=0;i<all.length;i++)if(all[i].id===id)return all[i];return null;}

function fillM(r){
  document.getElementById("mCity").value=r.city||"Lisbon";
  document.getElementById("mDate").value=r.date||"";
  document.getElementById("mTime").value=r.time||"";
  document.getElementById("mType").value=r.type||"dining";
  document.getElementById("mName").value=r.name||"";
  document.getElementById("mStatus").value=r.status||"confirmed";
  document.getElementById("mNote").value=r.note||"";
}
function readM(){
  return{city:document.getElementById("mCity").value,date:document.getElementById("mDate").value,
    time:document.getElementById("mTime").value.trim(),type:document.getElementById("mType").value,
    name:document.getElementById("mName").value.trim(),status:document.getElementById("mStatus").value,
    note:document.getElementById("mNote").value.trim()};
}

function openAdd(){MM="add";MT=null;document.getElementById("mtitle").textContent="Add reservation";document.getElementById("mDb").style.display="none";fillM({city:"Lisbon",date:"2026-04-09",type:"dining",status:"confirmed"});document.getElementById("mov").classList.add("open");setTimeout(function(){document.getElementById("mName").focus();},60);}
function openEdit(id){var r=findRes(id);if(!r)return;MM="edit";MT=id;document.getElementById("mtitle").textContent="Edit reservation";document.getElementById("mDb").style.display="inline-flex";fillM(r);document.getElementById("mov").classList.add("open");setTimeout(function(){document.getElementById("mName").focus();},60);}
function closeModal(){document.getElementById("mov").classList.remove("open");MM=null;MT=null;}

function doSave(){
  var data=readM();
  if(!data.name){document.getElementById("mName").focus();return;}
  if(!data.date){document.getElementById("mDate").focus();return;}
  if(MM==="add"){data.id="c"+Date.now();ST.custom.push(data);}
  else if(MM==="edit"){
    if(MT&&MT.charAt(0)==="r"){ST.edits[MT]=data;}
    else{for(var i=0;i<ST.custom.length;i++){if(ST.custom[i].id===MT){data.id=MT;ST.custom[i]=data;break;}}}
  }
  saveST();closeModal();renderAll();
}

function doDelete(){
  if(!MT)return;
  if(MT.charAt(0)==="r"){ST.deleted[MT]=1;delete ST.edits[MT];}
  else{ST.custom=ST.custom.filter(function(c){return c.id!==MT;});}
  saveST();closeModal();renderAll();
}

document.addEventListener("keydown",function(e){if(e.key==="Escape")closeModal();if(e.key==="Enter"&&(e.metaKey||e.ctrlKey))doSave();});
loadST();
</script>
</body>
</html>
