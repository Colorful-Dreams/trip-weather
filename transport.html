<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transport</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: transparent;
      color: #1a1a18;
      padding: 16px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 500;
      color: #b4b2a9;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 14px;
    }
    .leg-card {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 10px;
    }
    .leg-card.active {
      border: 1.5px solid #378ADD;
      background: #f5f9fe;
    }
    .leg-card.past {
      opacity: 0.5;
    }
    .leg-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .leg-type-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .type-badge {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 99px;
      white-space: nowrap;
    }
    .type-flight { background: #E6F1FB; color: #185FA5; }
    .type-train  { background: #EAF3DE; color: #3B6D11; }
    .type-taxi   { background: #F1EFE8; color: #5F5E5A; }
    .leg-date {
      font-size: 12px;
      color: #888780;
    }
    .active-tag {
      font-size: 11px;
      font-weight: 500;
      color: #185FA5;
      background: #E6F1FB;
      border-radius: 6px;
      padding: 3px 8px;
    }
    .done-tag {
      font-size: 11px;
      color: #b4b2a9;
      background: #f5f5f3;
      border-radius: 6px;
      padding: 3px 8px;
    }
    .route-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .city-from, .city-to {
      font-size: 16px;
      font-weight: 500;
      color: #1a1a18;
    }
    .route-middle {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      gap: 2px;
    }
    .route-line {
      width: 100%;
      height: 0.5px;
      background: rgba(0,0,0,0.15);
      position: relative;
    }
    .route-arrow {
      font-size: 13px;
      color: #b4b2a9;
    }
    .flight-num {
      font-size: 12px;
      color: #888780;
      white-space: nowrap;
    }
    .time-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .time-block {
      text-align: center;
      min-width: 60px;
    }
    .time-block.right { text-align: right; }
    .time-val {
      font-size: 18px;
      font-weight: 500;
      color: #1a1a18;
      line-height: 1;
      margin-bottom: 2px;
    }
    .time-airport {
      font-size: 11px;
      color: #b4b2a9;
    }
    .time-spacer { flex: 1; }
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 0.5px solid rgba(0,0,0,0.07);
    }
    .meta-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #5f5e5a;
      background: #f5f5f3;
      border-radius: 6px;
      padding: 4px 10px;
    }
    .meta-chip .chip-label {
      font-size: 11px;
      color: #b4b2a9;
    }
    .section-group {
      margin-bottom: 24px;
    }
    .note-chip {
      font-size: 12px;
      color: #854F0B;
      background: #FAEEDA;
      border-radius: 6px;
      padding: 4px 10px;
    }
    @media (max-width: 480px) {
      .city-from, .city-to { font-size: 14px; }
      .time-val { font-size: 16px; }
      .leg-card { padding: 12px 14px; }
    }
  </style>
</head>
<body>

<div id="transport-container"></div>

<script>
var legs = [
  {
    type: "flight",
    date: "2026-04-08",
    dateLabel: "Wednesday, April 8",
    from: "Newark", fromCode: "EWR",
    to: "Lisbon",   toCode: "LIS",
    depart: "8:25 PM", arrive: "8:20 AM (+1)",
    carrier: "United Airlines",
    flightNum: "UA 64",
    conf: "AGTEMK",
    confLabel: "Conf",
    notes: ["Polaris Business class", "Depart home ~3:30 PM for EWR", "United Polaris Lounge, Terminal C"]
  },
  {
    type: "flight",
    date: "2026-04-13",
    dateLabel: "Monday, April 13",
    from: "Lisbon", fromCode: "LIS",
    to: "Seville",  toCode: "SVQ",
    depart: "1:05 PM", arrive: "3:05 PM",
    carrier: "TAP Air Portugal",
    flightNum: "TP 1104",
    conf: "YUHL7A",
    confLabel: "Booking",
    notes: ["Checked bag + hand bag included", "Changes permitted with EUR 25 fee", "Non-refundable"]
  },
  {
    type: "train",
    date: "2026-04-16",
    dateLabel: "Thursday, April 16",
    from: "Seville", fromCode: "Santa Justa",
    to: "Madrid",    toCode: "Atocha",
    depart: "~10:30 AM", arrive: "~1:10 PM",
    carrier: "Renfe High-Speed",
    flightNum: "Direct AVE",
    conf: "",
    confLabel: "",
    notes: ["Book direct train, ~2h 30m", "Budget EUR 25–70 per person", "Arrive station 35–45 min early"]
  },
  {
    type: "train",
    date: "2026-04-19",
    dateLabel: "Sunday, April 19",
    from: "Madrid",   fromCode: "Atocha",
    to: "Valencia",   toCode: "Joaquín Sorolla",
    depart: "~10:30 AM", arrive: "~12:25 PM",
    carrier: "Renfe High-Speed",
    flightNum: "Direct AVE",
    conf: "",
    confLabel: "",
    notes: ["Book direct train, ~1h 55m", "Budget EUR 20–60 per person", "Arrive station 35–45 min early"]
  },
  {
    type: "train",
    date: "2026-04-22",
    dateLabel: "Wednesday, April 22",
    from: "Valencia",  fromCode: "Joaquín Sorolla",
    to: "Barcelona",   toCode: "Sants",
    depart: "~9:15 AM", arrive: "~12:30 PM",
    carrier: "Renfe Euromed",
    flightNum: "Direct Euromed",
    conf: "",
    confLabel: "",
    notes: ["Book direct Euromed, ~3h 15m", "Budget EUR 30–90 per person", "Arrive station 35–45 min early"]
  },
  {
    type: "flight",
    date: "2026-04-25",
    dateLabel: "Saturday, April 25",
    from: "Barcelona", fromCode: "BCN",
    to: "Newark",      toCode: "EWR",
    depart: "12:00 PM", arrive: "3:00 PM",
    carrier: "United Airlines",
    flightNum: "UA 121",
    conf: "AGTEMK",
    confLabel: "Conf",
    notes: ["United Premium Plus", "Depart Cotton House ~8:30 AM", "Eddie pick-up at EWR"]
  }
];

function pad(n) { return n < 10 ? "0" + n : "" + n; }

function getTodayStr() {
  var now = new Date();
  return now.getFullYear() + "-" + pad(now.getMonth()+1) + "-" + pad(now.getDate());
}

function render() {
  var today = getTodayStr();
  var container = document.getElementById("transport-container");
  var flightHTML = '<div class="section-group"><div class="section-label">Flights</div>';
  var trainHTML  = '<div class="section-group"><div class="section-label">Train legs</div>';

  for (var i = 0; i < legs.length; i++) {
    var L = legs[i];
    var isPast   = today > L.date;
    var isToday  = today === L.date;
    var cardClass = "leg-card" + (isToday ? " active" : "") + (isPast ? " past" : "");

    var html = '<div class="' + cardClass + '">';

    html += '<div class="leg-top">';
    html += '<div class="leg-type-row">';
    html += '<span class="type-badge type-' + L.type + '">' + (L.type === "flight" ? "Flight" : "Train") + '</span>';
    html += '<span class="leg-date">' + L.dateLabel + '</span>';
    html += '</div>';
    if (isToday) {
      html += '<span class="active-tag">Today</span>';
    } else if (isPast) {
      html += '<span class="done-tag">Complete</span>';
    }
    html += '</div>';

    html += '<div class="route-row">';
    html += '<div class="time-block">';
    html += '<div class="time-val">' + L.depart + '</div>';
    html += '<div class="time-airport">' + L.fromCode + '</div>';
    html += '</div>';
    html += '<div class="route-middle">';
    html += '<div class="flight-num">' + L.flightNum + '</div>';
    html += '<div class="route-arrow">&rarr;</div>';
    html += '<div class="flight-num" style="color:#d3d1c7;">' + L.carrier + '</div>';
    html += '</div>';
    html += '<div class="time-block right">';
    html += '<div class="time-val">' + L.arrive + '</div>';
    html += '<div class="time-airport">' + L.toCode + '</div>';
    html += '</div>';
    html += '</div>';

    html += '<div class="meta-row">';
    if (L.conf) {
      html += '<span class="meta-chip"><span class="chip-label">' + L.confLabel + '&nbsp;</span>' + L.conf + '</span>';
    }
    for (var j = 0; j < L.notes.length; j++) {
      html += '<span class="meta-chip">' + L.notes[j] + '</span>';
    }
    html += '</div>';

    html += '</div>';

    if (L.type === "flight") {
      flightHTML += html;
    } else {
      trainHTML += html;
    }
  }

  flightHTML += '</div>';
  trainHTML  += '</div>';

  container.innerHTML = flightHTML + trainHTML;
}

render();
</script>
</body>
</html>
