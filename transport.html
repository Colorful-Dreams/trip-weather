<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Transport - Portugal &amp; Spain 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#faf8f4;color:#1c1a17;padding:16px;}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.hdr-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:400;font-style:italic;}
.hdr-right{display:flex;gap:8px;align-items:center;}
.edit-btn{font-family:inherit;font-size:12px;font-weight:500;padding:6px 14px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.15);background:#fff;color:#5f5e5a;cursor:pointer;}
.edit-btn.on{background:#1c1a17;color:#fff;border-color:#1c1a17;}
.add-btn{font-family:inherit;font-size:12px;font-weight:500;padding:6px 14px;border-radius:8px;border:none;background:#1D9E75;color:#fff;cursor:pointer;display:none;}
.add-btn:hover{opacity:0.88;}
body.emode .add-btn{display:inline-block;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.fbtn{font-family:inherit;font-size:12px;font-weight:500;padding:5px 14px;border-radius:99px;border:0.5px solid rgba(0,0,0,0.13);background:#fff;color:#5f5e5a;cursor:pointer;}
.fbtn.active{background:#1c1a17;color:#fff;border-color:#1c1a17;}
.fbtn:hover:not(.active){background:#f5f5f3;}
.slbl{font-size:11px;font-weight:500;color:#b4b2a9;text-transform:uppercase;letter-spacing:0.07em;margin:0 0 10px;}
.sgrp{margin-bottom:22px;}
.lcard{background:#fff;border:0.5px solid rgba(0,0,0,0.10);border-radius:12px;padding:15px 18px;margin-bottom:8px;}
.lcard.today{border:1.5px solid #378ADD;background:#f5f9fe;}
.lcard.past{opacity:0.45;}
.ltop{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px;}
.ltop-l{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.tbadge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px;white-space:nowrap;}
.tb-f{background:#E6F1FB;color:#185FA5;}
.tb-t{background:#EAF3DE;color:#3B6D11;}
.tb-x{background:#F1EFE8;color:#5F5E5A;}
.ldate{font-size:12px;color:#888780;}
.ttag{font-size:11px;font-weight:500;color:#185FA5;background:#E6F1FB;border-radius:6px;padding:3px 8px;}
.dtag{font-size:11px;color:#b4b2a9;background:#f5f5f3;border-radius:6px;padding:3px 8px;}
.ctag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:99px;background:#E6F1FB;color:#185FA5;margin-left:4px;}
.rrow{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.ep{font-size:15px;font-weight:500;color:#1c1a17;}
.rmid{display:flex;flex-direction:column;align-items:center;flex:1;gap:1px;min-width:80px;}
.fnum{font-size:12px;color:#888780;white-space:nowrap;}
.arr{font-size:13px;color:#b4b2a9;}
.cname{font-size:11px;color:#d3d1c7;}
.tcol{text-align:right;}
.tval{font-size:13px;font-weight:500;color:#1c1a17;}
.tcode{font-size:11px;color:#b4b2a9;margin-top:2px;}
.metarow{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;padding-top:8px;border-top:0.5px solid rgba(0,0,0,0.07);}
.chip{font-size:12px;color:#5f5e5a;background:#f5f5f3;border-radius:6px;padding:3px 8px;}
.ract{display:none;gap:4px;}
body.emode .ract{display:flex;}
.ra{font-family:inherit;font-size:11px;padding:3px 8px;border-radius:5px;border:0.5px solid rgba(0,0,0,0.13);cursor:pointer;background:#fff;color:#5f5e5a;line-height:1.4;}
.ra:hover{background:#f5f5f3;}
.ra.del{color:#a32d2d;border-color:rgba(163,45,45,0.2);}
.ra.del:hover{background:#fcebeb;}
.sstatus{font-size:11px;color:#b4b2a9;text-align:center;margin-top:12px;min-height:16px;}
.sstatus.saving{color:#854F0B;}
.sstatus.saved{color:#3B6D11;}
.sstatus.err{color:#a32d2d;}
.mov{display:none;position:fixed;inset:0;background:rgba(20,18,15,0.5);z-index:500;align-items:center;justify-content:center;padding:16px;}
.mov.open{display:flex;}
.modal{background:#fff;border-radius:16px;padding:22px;width:100%;max-width:480px;box-shadow:0 8px 32px rgba(0,0,0,0.14);max-height:90vh;overflow-y:auto;}
.mtitle{font-size:15px;font-weight:500;color:#1c1a17;margin-bottom:14px;}
.mf{margin-bottom:12px;}
.mf label{display:block;font-size:11px;font-weight:500;color:#9b9489;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;}
.mf input,.mf select{width:100%;font-family:inherit;font-size:13px;padding:8px 10px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.18);color:#1c1a17;background:#faf8f4;outline:none;}
.mf input:focus,.mf select:focus{border-color:#1D9E75;box-shadow:0 0 0 2px rgba(29,158,117,0.12);}
.mfr{display:flex;gap:10px;}
.mfr .mf{flex:1;}
.macts{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap;}
.mb{font-family:inherit;font-size:13px;font-weight:500;padding:8px 16px;border-radius:8px;cursor:pointer;border:none;}
.mb.cancel{background:#f5f5f3;color:#5f5e5a;}
.mb.save{background:#1c1a17;color:#fff;}
.mb.danger{background:#fcebeb;color:#a32d2d;margin-right:auto;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">Transport &amp; directions</div>
  <div class="hdr-right">
    <button class="add-btn" onclick="openAdd()">+ Add leg</button>
    <button class="edit-btn" id="editToggle" onclick="toggleEdit()">Edit</button>
  </div>
</div>

<div class="filter-row">
  <button class="fbtn active" onclick="setFilter('all')">All</button>
  <button class="fbtn" onclick="setFilter('flight')">Flights</button>
  <button class="fbtn" onclick="setFilter('train')">Trains</button>
  <button class="fbtn" onclick="setFilter('taxi')">Taxi / transfer</button>
</div>

<div id="container"></div>
<div class="sstatus" id="ss"></div>

<div class="mov" id="mov" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mtitle" id="mtitle">Add leg</div>
    <div class="mfr">
      <div class="mf"><label>Type</label>
        <select id="mT"><option value="flight">Flight</option><option value="train">Train</option><option value="taxi">Taxi / transfer</option></select>
      </div>
      <div class="mf"><label>Date</label><input id="mD" type="date" min="2026-04-08" max="2026-04-25"/></div>
    </div>
    <div class="mfr">
      <div class="mf"><label>From</label><input id="mF" type="text" placeholder="e.g. Lisbon (LIS)"/></div>
      <div class="mf"><label>To</label><input id="mTo" type="text" placeholder="e.g. Seville (SVQ)"/></div>
    </div>
    <div class="mfr">
      <div class="mf"><label>Depart</label><input id="mDep" type="text" placeholder="e.g. 1:05 PM"/></div>
      <div class="mf"><label>Arrive</label><input id="mArr" type="text" placeholder="e.g. 3:05 PM"/></div>
    </div>
    <div class="mfr">
      <div class="mf"><label>Flight / train #</label><input id="mFN" type="text" placeholder="e.g. UA 64"/></div>
      <div class="mf"><label>Carrier</label><input id="mC" type="text" placeholder="e.g. United Airlines"/></div>
    </div>
    <div class="mfr">
      <div class="mf"><label>Conf / booking code</label><input id="mCf" type="text" placeholder="e.g. AGTEMK"/></div>
      <div class="mf"><label>Conf label</label><input id="mCl" type="text" placeholder="e.g. Conf, Booking"/></div>
    </div>
    <div class="mf"><label>Notes (comma separated)</label><input id="mN" type="text" placeholder="e.g. Business class, Checked bag included"/></div>
    <div class="macts">
      <button class="mb danger" id="mDb" onclick="doDelete()" style="display:none">Delete</button>
      <button class="mb cancel" onclick="closeModal()">Cancel</button>
      <button class="mb save" onclick="doSave()">Save</button>
    </div>
  </div>
</div>

<script>
var APPS_URL = "https://script.google.com/macros/s/AKfycbzUDiET7vZZJrHpTydoR6hpBixpqP9yUK_qHlvLi-oIVKoPOAaf7YUTYm2ahZ1lnNeJ/exec";
var SYNC_KEY = "transport-state";
var saveTimer = null;

function syncLoad(onData) {
  onData(null);
  fetch(APPS_URL + "?key=" + encodeURIComponent(SYNC_KEY))
  .then(function(r) { return r.text(); })
  .then(function(text) {
    if (!text || text.trim() === "{}") return;
    try {
      var parsed = JSON.parse(text);
      if (parsed && typeof parsed === "object" && Object.keys(parsed).length > 0) {
        onData(parsed);
      }
    } catch(ex) {}
  })
  .catch(function() {
    try {
      var x = localStorage.getItem("transport-local");
      if (x) { var p = JSON.parse(x); if (p && Object.keys(p).length > 0) onData(p); }
    } catch(ex) {}
  });
}

function syncSave(data) {
  try { localStorage.setItem("transport-local", JSON.stringify(data)); } catch(ex) {}
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(function() {
    fetch(APPS_URL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({key: SYNC_KEY, value: JSON.stringify(data)})
    }).catch(function() {});
  }, 800);
}
var ST={edits:{},custom:[],deleted:{}};
var MM=null,MT=null;
var BASE=[
  {id:"l01",type:"flight",date:"2026-04-08",from:"Newark (EWR)",to:"Lisbon (LIS)",depart:"8:25 PM",arrive:"8:20 AM (+1)",flightNum:"UA 64",carrier:"United Airlines",conf:"AGTEMK",confLabel:"Conf",notes:["Polaris Business","Depart home ~3:30 PM for EWR","United Polaris Lounge Terminal C"]},
  {id:"l02",type:"flight",date:"2026-04-13",from:"Lisbon (LIS)",to:"Seville (SVQ)",depart:"1:05 PM",arrive:"3:05 PM",flightNum:"TP 1104",carrier:"TAP Air Portugal",conf:"YUHL7A",confLabel:"Booking",notes:["Checked bag + hand bag included","Changes with EUR 25 fee","Non-refundable"]},
  {id:"l03",type:"train",date:"2026-04-16",from:"Seville Santa Justa",to:"Madrid Atocha",depart:"~10:30 AM",arrive:"~1:10 PM",flightNum:"Direct AVE",carrier:"Renfe",conf:"",confLabel:"",notes:["~2h 30m","Budget EUR 25-70 per person","Arrive station 35-45 min early"]},
  {id:"l04",type:"train",date:"2026-04-19",from:"Madrid Atocha",to:"Valencia Joaquin Sorolla",depart:"~10:30 AM",arrive:"~12:25 PM",flightNum:"Direct AVE",carrier:"Renfe",conf:"",confLabel:"",notes:["~1h 55m","Budget EUR 20-60 per person","Arrive station 35-45 min early"]},
  {id:"l05",type:"train",date:"2026-04-22",from:"Valencia Joaquin Sorolla",to:"Barcelona Sants",depart:"~9:15 AM",arrive:"~12:30 PM",flightNum:"Direct Euromed",carrier:"Renfe",conf:"",confLabel:"",notes:["~3h 15m","Budget EUR 30-90 per person","Arrive station 35-45 min early"]},
  {id:"l06",type:"flight",date:"2026-04-25",from:"Barcelona (BCN)",to:"Newark (EWR)",depart:"12:00 PM",arrive:"3:00 PM",flightNum:"UA 121",carrier:"United Airlines",conf:"AGTEMK",confLabel:"Conf",notes:["United Premium Plus","Depart Cotton House ~8:30 AM","Eddie pick-up at EWR"]}
];
;
function normST(){if(!ST.edits)ST.edits={};if(!ST.custom)ST.custom=[];if(!ST.deleted)ST.deleted={}; }

function loadST(){
  syncLoad(function(data){
    if(data){ST=data;normST();}
    renderAll();
  });
}

function saveST(){
  syncSave(ST);
}


function allLegs(){
  var r=[];
  BASE.forEach(function(l){if(ST.deleted[l.id])return;var e=ST.edits[l.id];r.push(e?Object.assign({},l,e):Object.assign({},l));});
  ST.custom.forEach(function(c){r.push(Object.assign({},c));});
  return r;
}

var MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var WDAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
function pad(n){return n<10?"0"+n:""+n;}
function todayStr(){var n=new Date();return n.getFullYear()+"-"+pad(n.getMonth()+1)+"-"+pad(n.getDate());}
function fmtDate(s){var d=new Date(s+"T12:00:00Z");return WDAYS[d.getUTCDay()]+" "+MONTHS[d.getUTCMonth()]+" "+d.getUTCDate();}
function X(s){if(!s)return "";var r="";for(var i=0;i<s.length;i++){var c=s[i];if(c==="&")r+="&amp;";else if(c==="<")r+="&lt;";else if(c===">")r+="&gt;";else if(c==='"')r+="&quot;";else r+=c;}return r;}

function setFilter(f){
  CF=f;
  document.querySelectorAll(".fbtn").forEach(function(b){
    b.classList.toggle("active",(f==="all"&&b.textContent==="All")||(f!=="all"&&b.textContent.toLowerCase().indexOf(f)===0));
  });
  renderAll();
}

function badgeHTML(t){
  var m={flight:["tb-f","Flight"],train:["tb-t","Train"],taxi:["tb-x","Taxi / transfer"]};
  var v=m[t]||["tb-x",t];
  return '<span class="tbadge '+v[0]+'">'+v[1]+'</span>';
}

function renderGroup(lbl,arr){
  if(!arr.length)return "";
  arr.sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;});
  var today=todayStr();
  var h='<div class="sgrp"><div class="slbl">'+lbl+'</div>';
  arr.forEach(function(l){
    var isPast=today>l.date,isToday=today===l.date;
    var isCustom=l.id&&l.id.charAt(0)==="c";
    var notes=l.notes||[];
    h+='<div class="lcard'+(isToday?" today":"")+(isPast?" past":"")+'">';
    h+='<div class="ltop"><div class="ltop-l">'+badgeHTML(l.type)+'<span class="ldate">'+fmtDate(l.date)+'</span>'+(isCustom?'<span class="ctag">Custom</span>':'')+'</div>';
    h+='<div style="display:flex;gap:6px;align-items:center;">';
    if(isToday) h+='<span class="ttag">Today</span>';
    else if(isPast) h+='<span class="dtag">Complete</span>';
    h+='<div class="ract"><button class="ra" onclick="openEdit(\''+X(l.id)+'\')">Edit</button><button class="ra del" onclick="openDel(\''+X(l.id)+'\')">Delete</button></div>';
    h+='</div></div>';
    h+='<div class="rrow"><div class="ep">'+X(l.from)+'</div>';
    h+='<div class="rmid"><div class="fnum">'+X(l.flightNum)+'</div><div class="arr">-></div><div class="cname">'+X(l.carrier)+'</div></div>';
    h+='<div class="ep tcol"><div class="tval">'+X(l.depart)+' -> '+X(l.arrive)+'</div>';
    if(l.conf) h+='<div class="tcode">'+X(l.confLabel||"Conf")+': '+X(l.conf)+'</div>';
    h+='</div></div>';
    if(notes.length){h+='<div class="metarow">';notes.forEach(function(n){h+='<span class="chip">'+X(n)+'</span>';});h+='</div>';}
    h+='</div>';
  });
  return h+'</div>';
}

function renderAll(){
  var legs=allLegs();
  var flights=[],trains=[],taxis=[];
  legs.forEach(function(l){
    if(CF!=="all"&&l.type!==CF)return;
    if(l.type==="flight")flights.push(l);
    else if(l.type==="train")trains.push(l);
    else taxis.push(l);
  });
  var html="";
  if(CF==="all"||CF==="flight") html+=renderGroup("Flights",flights);
  if(CF==="all"||CF==="train")  html+=renderGroup("Train legs",trains);
  if(CF==="all"||CF==="taxi")   html+=renderGroup("Taxi / transfers",taxis);
  if(!html) html='<div style="text-align:center;padding:32px;font-size:13px;color:#9b9489;">No legs match this filter.</div>';
  document.getElementById("container").innerHTML=html;
}

function toggleEdit(){
  document.body.classList.toggle("emode");
  var btn=document.getElementById("editToggle");
  if(document.body.classList.contains("emode")){btn.textContent="Done";btn.classList.add("on");}
  else{btn.textContent="Edit";btn.classList.remove("on");}
}

function fillM(l){
  document.getElementById("mT").value=l.type||"flight";
  document.getElementById("mD").value=l.date||"";
  document.getElementById("mF").value=l.from||"";
  document.getElementById("mTo").value=l.to||"";
  document.getElementById("mDep").value=l.depart||"";
  document.getElementById("mArr").value=l.arrive||"";
  document.getElementById("mFN").value=l.flightNum||"";
  document.getElementById("mC").value=l.carrier||"";
  document.getElementById("mCf").value=l.conf||"";
  document.getElementById("mCl").value=l.confLabel||"";
  document.getElementById("mN").value=(l.notes||[]).join(", ");
}
function readM(){
  var notes=document.getElementById("mN").value.split(",").map(function(s){return s.trim();}).filter(Boolean);
  return{type:document.getElementById("mT").value,date:document.getElementById("mD").value,
    from:document.getElementById("mF").value.trim(),to:document.getElementById("mTo").value.trim(),
    depart:document.getElementById("mDep").value.trim(),arrive:document.getElementById("mArr").value.trim(),
    flightNum:document.getElementById("mFN").value.trim(),carrier:document.getElementById("mC").value.trim(),
    conf:document.getElementById("mCf").value.trim(),confLabel:document.getElementById("mCl").value.trim(),
    notes:notes};
}

function findLeg(id){var all=allLegs();for(var i=0;i<all.length;i++)if(all[i].id===id)return all[i];return null;}

function openAdd(){MM="add";MT=null;document.getElementById("mtitle").textContent="Add transport leg";document.getElementById("mDb").style.display="none";fillM({type:"flight",date:"2026-04-08"});document.getElementById("mov").classList.add("open");setTimeout(function(){document.getElementById("mF").focus();},60);}
function openEdit(id){var l=findLeg(id);if(!l)return;MM="edit";MT=id;document.getElementById("mtitle").textContent="Edit leg";document.getElementById("mDb").style.display="inline-flex";fillM(l);document.getElementById("mov").classList.add("open");setTimeout(function(){document.getElementById("mF").focus();},60);}
function openDel(id){var l=findLeg(id);if(!l)return;MM="del";MT=id;document.getElementById("mtitle").textContent="Delete this leg?";document.getElementById("mDb").style.display="inline-flex";fillM(l);document.getElementById("mov").classList.add("open");}
function closeModal(){document.getElementById("mov").classList.remove("open");MM=null;MT=null;}

function doSave(){
  var data=readM();
  if(!data.from||!data.to){document.getElementById("mF").focus();return;}
  if(!data.date){document.getElementById("mD").focus();return;}
  if(MM==="add"){data.id="c"+Date.now();ST.custom.push(data);}
  else if(MM==="edit"){
    if(MT&&MT.charAt(0)==="l"){ST.edits[MT]=data;}
    else{for(var i=0;i<ST.custom.length;i++){if(ST.custom[i].id===MT){data.id=MT;ST.custom[i]=data;break;}}}
  }
  saveST();closeModal();renderAll();
}

function doDelete(){
  if(!MT)return;
  if(MT.charAt(0)==="l"){ST.deleted[MT]=1;delete ST.edits[MT];}
  else{ST.custom=ST.custom.filter(function(c){return c.id!==MT;});}
  saveST();closeModal();renderAll();
}

document.addEventListener("keydown",function(e){if(e.key==="Escape")closeModal();if(e.key==="Enter"&&(e.metaKey||e.ctrlKey))doSave();});
loadST();
</script>
</body>
</html>
